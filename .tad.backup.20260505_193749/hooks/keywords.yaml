# Domain Pack Keywords Database
# Phase 2b — Architecture C (deterministic keyword match, no LLM)
# Curated: 2026-04-07 by Blake (Phase 2b handoff + Round 2 tuning)
#
# EDITING GUIDELINES
#  - Each pack: >= 3 distinct English keywords + >= 3 distinct Chinese keywords
#  - Each pack: >= 3 UNIQUE anchors (zero cross-pack)
#  - No keyword should appear in > 2 packs (integrity audit enforced)
#  - Min length: English 3 chars, Chinese 2 chars
#  - Threshold = DISTINCT KEYWORD MATCH COUNT required
#  - Matching is case-insensitive, literal substring (awk tolower + index)
#  - Keywords SHOULD include both hyphenated AND space-separated variants of
#    multi-word terms (e.g. "react native" + "react-native") because bash
#    literal match won't bridge the gap.
#  - Banned high-collision words: build, code, test, project, system, api,
#    design, tool, file, data — DO NOT add unless absolutely pack-defining

whitelist:
  - "yes"
  - "no"
  - "ok"
  - "y"
  - "n"
  - "继续"
  - "嗯"
  - "明白"
  - "收到"
  - "好的"

