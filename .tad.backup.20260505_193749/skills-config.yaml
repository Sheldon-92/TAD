        description: "创建 Skill 文件时参考"

      - pattern: "*.test.ts|*.spec.ts|*_test.go|*_test.py"
        skill: "test-driven-development.md"
        action: "recommend"
        description: "创建测试文件时参考"

      - pattern: "**/api/**|**/routes/**|**/endpoints/**"
        skill: "api-design.md"
        action: "recommend"
        description: "创建 API 相关文件时参考"

      - pattern: "**/migrations/**|**/schema/**|**/models/**"
        skill: "database-patterns.md"
        action: "recommend"
        description: "创建数据库相关文件时参考"

      # 国际化文件
      - pattern: "**/locales/**|**/i18n/**|**/*.po|**/*.pot"
        skill: "i18n-translation.md"
        action: "recommend"
        description: "处理国际化文件时参考"

      # 数据文件
      - pattern: "*.xlsx|*.xls|*.csv"
        skill: "xlsx-analysis.md"
        action: "recommend"
        description: "处理表格数据时参考"

      - pattern: "*.pdf"
        skill: "pdf-processing.md"
        action: "recommend"
        description: "处理 PDF 文件时参考"

      - pattern: "*.pptx|*.ppt"
        skill: "pptx-creation.md"
        action: "recommend"
        description: "创建演示文稿时参考"

      # Jupyter notebooks
      - pattern: "*.ipynb"
        skill: "data-science.md"
        action: "recommend"
        description: "编写 Jupyter notebook 时参考"

      # 媒体文件
      - pattern: "*.mp4|*.mp3|*.wav|*.avi|*.mov"
        skill: "media-processing.md"
        action: "recommend"
        description: "处理媒体文件时参考"

      # Git 相关
      - pattern: ".gitignore|.gitattributes|**/.git/**"
        skill: "git-workflow.md"
        action: "recommend"
        description: "配置 Git 时参考"

      # 组件/UI 文件
      - pattern: "**/components/**/*.tsx|**/components/**/*.vue"
        skill: "ui-design.md"
        action: "recommend"
        description: "创建 UI 组件时参考"

      # 文档文件
      - pattern: "docs/**/*.md|README.md|CHANGELOG.md"
        skill: "doc-organization.md"
        action: "recommend"
        description: "整理文档时参考"

    # 命令 → Skill 映射
    command_mapping:
      - commands: ["*create-skill", "*new-skill"]
        skill: "skill-creator.md"
        action: "mandatory"

      - commands: ["*test", "*develop"]
        skill: "test-driven-development.md"
        action: "recommend"

      - commands: ["*review", "*code-review"]
        skill: "code-review.md"
        action: "recommend"

      - commands: ["*deploy", "*release"]
        skill: "security-checklist.md"
        action: "mandatory"

      - commands: ["*debug", "*fix"]
        skill: "systematic-debugging.md"
        action: "recommend"

      - commands: ["*refactor"]
        skill: "refactoring.md"
        action: "recommend"

      - commands: ["*perf", "*optimize", "*performance"]
        skill: "performance-optimization.md"
        action: "recommend"

      - commands: ["*handoff", "*alex"]
        skill: "doc-organization.md"
        action: "recommend"

      - commands: ["*brainstorm", "*ideate"]
        skill: "brainstorming.md"
        action: "recommend"

      - commands: ["*translate", "*i18n"]
        skill: "i18n-translation.md"
        action: "recommend"

    # Agent 行为规范
    agent_behavior:
      on_match:
        recommend:
          action: "提示用户并建议读取，但不阻塞执行"
          message_template: |
            💡 检测到任务与 {skill_name} 相关
            建议先参考此 Skill 以获得最佳实践指导
            是否需要我先读取？[Y/n]

        mandatory:
          action: "自动读取 Skill，不询问用户"
          message_template: |
            📚 正在加载必要参考: {skill_name}
            原因: {reason}

      on_no_match:
        action: "正常执行任务，不干预"

      on_multiple_match:
        action: "按优先级排序，提示用户选择或全部读取"
        max_suggestions: 3

# ==================== Learn 记忆系统 (v1.4 新增) ====================
learn_system:
  enabled: true
  version: "1.4"
  description: "框架级建议记录系统，用于 TAD 持续改进"

  # 核心原则
  principles:
    - "只记录框架级建议，不记录项目级内容"
    - "项目级内容由 Alex 通过 handover/文档自行处理"
    - "记录后需 Human 确认才推送到 TAD 仓库"
    - "推送后的内容等 TAD 升级时再处理"

  # /tad-learn 命令
  command:
    name: "/tad-learn"
    invocation: "Alex 或 Blake 发现框架级改进建议时"

    record_content:
      - "开发流程改进建议"
      - "Agent 配合问题/优化"
      - "方法论发现"
      - "有用的工具/项目/库"
      - "新的检查点建议"

    not_record:
      - "项目特定的配置/决策"
      - "项目的业务逻辑"
      - "项目的代码实现"

  # 工作流程
  workflow:
    step1_discover:
      trigger: "Alex/Blake 发现有价值的框架级建议"
      action: "执行 /tad-learn"

    step2_record:
      action: "记录建议内容"
      format: |
        ## Learning Entry
        Date: {timestamp}
        Agent: {alex|blake}
        Category: {category}

        ### 发现
