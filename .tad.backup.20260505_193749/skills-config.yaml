      # AI/Prompt 相关
      - intents: ["prompt设计", "提示词", "prompt engineering", "写prompt"]
        skill: "prompt-engineering.md"
        action: "recommend"

      - intents: ["AI集成", "LLM", "接入AI", "调用AI"]
