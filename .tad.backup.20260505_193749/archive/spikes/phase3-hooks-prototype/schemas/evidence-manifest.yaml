# TAD Evidence Manifest Schema (Phase 3, v3-LEAN §1.1)
# Loaded by evidence-validator.sh to determine what files must exist
# before a sentinel Write (AW-2/BW-1) is allowed.
#
# Manifest cap: ≤5 required patterns per manifest (lean rule — prevents Alex
# from ballooning the required list).

alex_handoff_ready:
  description: "Alex about to finalize HANDOFF with 📨 Message from Alex sentinel"
  required:
    - pattern: ".tad/evidence/reviews/alex/${handoff_slug}/*.md"
      min_count: 2
      min_bytes: 500
    - pattern: ".tad/evidence/gates/${handoff_slug}/gate2-verdict.tsv"
      must_contain: "PASS"

blake_completion_ready:
  description: "Blake about to finalize COMPLETION + 📨 Message from Blake sentinel"
  required:
    - pattern: ".tad/active/handoffs/COMPLETION-*-${handoff_slug}.md"
      anchor: "^Overall: (PASS|FAIL|PARTIAL-GO)$"
      anchor_outside_fence: true
    - pattern: ".tad/evidence/reviews/blake/${handoff_slug}/*.md"
      min_count: 2
      min_bytes: 500
    - pattern: ".tad/evidence/gates/${handoff_slug}/gate3-verdict.tsv"
      must_contain: "PASS"
