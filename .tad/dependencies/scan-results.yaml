    changelog_text: "## Security\r\n\r\nA security vulnerability has been identified, and fixed, that could allow command execution on a user's computer when connecting to a malicious Codespace via `gh codespace jupyter`.\r\n\r\nUsers of `gh codespace jupyter` are advised to update gh to version v2.96.0 as soon as possible.\r\n\r\nFor more information see: https://github.com/cli/cli/security/advisories/GHSA-8cg3-r6g9-fpg2\r\n\r\n## Download release assets without authentication\r\n\r\n`gh release download` now works against public repositories without authentication, matching `gh extension install`. A token is still used when one is present:\r\n\r\n```shell\r\n# Download assets from a public repository, no login required\r\ngh release download v2.96.0 --repo cli/cli\r\n```\r\n\r\n## What's Changed\r\n\r\n### ✨ Features\r\n\r\n* Allow `gh release download` without authentication on public repositories by @BagToad in [#13723](https://github.com/cli/cli/pull/13723)\r\n* Detect additional third-party coding agents by @BagToad in [#13722](https://github.com/cli/cli/pull/13722)\r\n* Support `antigravity-cli` and `antigravity2.0` in `gh skill` by @BagToad in [#13784](https://github.com/cli/cli/pull/13784)\r\n\r\n### \U0001F41B Fixes\r\n\r\n* fix: show checks summary when all checks were cancelled by @s3onghyun in [#13679](https://github.com/cli/cli/pull/13679)\r\n* fix(skills): install universal agent to `~/.agents/skills` by @toller892 in [#13681](https://github.com/cli/cli/pull/13681)\r\n* fix(skills): honor `--dir` without agent prompt by @happysnaker in [#13766](https://github.com/cli/cli/pull/13766)\r\n* Fix concurrent map writes in codespace port forwarding by @williammartin in [#13313](https://github.com/cli/cli/pull/13313)\r\n* Use `int64` for GitHub database IDs by @williammartin in [#13403](https://github.com/cli/cli/pull/13403)\r\n\r\n### \U0001F4DA Docs & Chores\r\n\r\n* Pin reusable triage workflows to a commit SHA by @BagToad in [#13705](https://github.com/cl