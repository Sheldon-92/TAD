# pack-collisions.yaml — CONFIRMED cross-pack directive collisions (STAGE 2 output).
#
# This is the FINAL, post-LLM-confirm registry. It is a SEPARATE file from
# pack-registry.yaml (which is auto-generated by scan-packs.sh and READ-ONLY here).
#
# Provenance: candidates are seeded by scan-collisions.sh (grep-seed, STAGE 1) into
#   .tad/evidence/yolo/pack-collision-detection/pack-collisions.candidates.yaml
# then an agent runs the LLM-CONFIRM contract (see .tad/guides/pack-collision-detection.md):
#   opens BOTH file:line refs, confirms a TRUE opposing directive (not a co-mention),
#   assigns a category per side, computes resolution via the precedence engine, and
#   writes the confirmed row here (dropping false positives with a recorded drop_rationale).
#
# ⚠️ Anti-validation-theater: "N collisions found" is NOT acceptance. Every `ref` below
#    MUST be hand-re-derivable against the LIVE pack files (count != signal,
#    architecture.md 2026-05-30). Each was hand-re-derived against .claude/skills/ on 2026-05-31.
#
# ⚠️ Canonical tree (P0-2): every `ref` is recorded against `.claude/skills/` — the
#    runtime-loaded tree the P2 surfacing consumers actually load. `.tad/capability-packs/`
#    is a *sync-maintained source copy; it is NOT the ref anchor.
#
# Precedence engine (see guide §Precedence Engine):
#   security/safety/compliance/data-integrity(1) > correctness(2) > a11y(3) > performance(4) > style(5)
#   CROSS-category → resolution: auto (lower category number wins), with a visible log.
#   SAME-category  → resolution: escalate (precedence cannot break the tie).
#   uncategorizable side → resolution: escalate (never a silent auto-resolve).

collisions:
  # ── Collision 1 — Inter font (CROSS-category → auto-resolve) ────────────────
  - pack_a: web-ui-design
    pack_b: web-frontend
    topic: inter-font
    a_says:
      ref: ".claude/skills/web-ui-design/SKILL.md:93"
      quote: "NEVER use Inter, Roboto, Arial, or system-ui as the primary typeface."
      category: style
    b_says:
      ref: ".claude/skills/web-frontend/references/performance.md:215"
      quote: "import { Inter } from 'next/font/google'"
      category: performance
    resolution: auto
    winner: web-frontend        # performance(4) outranks style(5)
    loser: web-ui-design
    rule: "performance>style"
    logged: true
    confirmed_by: "opened web-ui-design/SKILL.md:93 (style ban) + web-frontend/references/performance.md:215 (next/font perf endorse) — true opposing directive, not a co-mention"
    # NOTE — dangerous case: the visible log lets a human verify web-frontend is loading
    # Inter as an OPTIMIZED webfont, NOT installing it as the PRIMARY typeface (which the
    # style ban targets). Without the log this auto-resolve could silently mask a real
    # anti-slop violation. scan-collisions.sh also flagged CONVENTIONS.md:195 (same
    # next/font endorsement) — same resolution; performance.md:215 is the canonical ref.

  # ── Collision 2 — Contrast standard (SAME-category a11y → escalate) ─────────
  - pack_a: web-ui-design
    pack_b: web-frontend
    topic: contrast-standard
    a_says:
      ref: ".claude/skills/web-ui-design/SKILL.md:454"
      quote: "Step 4: Validate contrast with APCA (LC ≥60 body, ≥45 large — see SKILL.md:476)"
      category: a11y
    b_says:
      ref: ".claude/skills/web-frontend/references/accessibility.md:45"
      quote: "Minimum 4.5:1 (normal text), 3:1 (large text/UI) — WCAG 2.2 SC 1.4.3"
      category: a11y
    resolution: escalate
    reason: same-category      # a11y vs a11y — APCA and WCAG2.x can disagree on the same color pair; precedence cannot pick
    logged: true
    confirmed_by: "opened web-ui-design/SKILL.md:454+:476 (APCA LC scale) + web-frontend/references/accessibility.md:45 (WCAG 4.5:1 ratio) — both prescribe a contrast STANDARD, conflicting"
    # NOTE — this collision also touches a THIRD pack on the WCAG side:
    # web-testing/references/accessibility-testing-rules.md:12 ("Contrast ratio >= 4.5:1
    # for normal text"). It is the same a11y-vs-a11y escalate either way; recorded here as
    # the web-ui-design × web-frontend pair per §4.3.

  # ── Collision 3 — Testing pyramid ratios (SAME-category testing → escalate) ─
  - pack_a: web-frontend
    pack_b: web-testing
    topic: testing-pyramid
    a_says:
      ref: ".claude/skills/web-frontend/references/testing.md:15"
      quote: "Unit (most) ~60%; E2E (fewest) ~10%; if E2E >20% of the suite — cut (testing.md:19)"
      category: correctness     # testing directives sit in the correctness band (P1-A: rankable member of the 5-band list)
      subdomain: testing
    b_says:
      ref: ".claude/skills/web-testing/references/test-strategy-rules.md:25"
      quote: "Unit tests (base) ~70% of test count; UI-heavy app: More E2E tests (test-strategy-rules.md:31)"
      category: correctness     # same band as a_says → tie → escalate (verdict unchanged)
      subdomain: testing
    resolution: escalate
    reason: same-category      # correctness vs correctness (testing subdomain): 60% vs 70% base + opposing E2E conditional — soft divergence, human picks
    logged: true
    confirmed_by: "opened web-frontend/references/testing.md:15+:19 (cut E2E >20%) + web-testing/references/test-strategy-rules.md:25+:31 (more E2E for UI-heavy) — opposing test-distribution directives"
