# Behavioral Eval Status — capability pack verification tracker
# ---------------------------------------------------------------------------
# WHY a SIDE-FILE (not a field in pack-registry.yaml):
#   pack-registry.yaml is AUTO-GENERATED by scan-packs.sh (`cat > $OUTPUT` —
#   full regen from CAPABILITY.md/SKILL.md frontmatter). Any `behaviorally_verified`
#   field added to the registry would be CLOBBERED on the next scan. This side-file
#   is user/conductor-owned state and survives registry regeneration.
#   (Pattern: architecture.md "Pack registry desync fix + drift-check" / Registry
#    field design — separate derived scan data from persisted decision state.)
#
# STATUS SEMANTICS:
#   pending     — fixture(s) exist; NO passing behavioral eval recorded yet.
#                 Default for every installed capability pack. Count of fixtures
#                 is NOT verification (count ≠ signal — YOLO audit "validation theater").
#   verified    — a pack-loaded sub-agent ran a fixture's Input Scenario, the
#                 captured output PASSED pack-eval-runner.sh (actual ≥ min_marker_count).
#                 ONLY the Conductor flips pending → verified after a real eval run
#                 (AC5.6, driven in Y6 — NOT by Blake, NOT by fixture authoring).
#   no-fixture  — pack is registered in .tad/capability-packs/ but is NOT installed
#                 as a .claude/skills/<pack>/ skill, so it has no examples/ fixture.
#
# CONTRACT: pack-eval-runner.sh --all <outputs-dir> produces the PASS/FAIL data that
#   justifies a flip. Never hand-set `verified` — only a passing runner result does.
# ---------------------------------------------------------------------------

