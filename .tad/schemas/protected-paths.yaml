# TAD Protected Paths Schema (Phase 3, v3-LEAN §1 HP-1/HP-2)
# Loaded by path-guard.sh + content-scanner.sh
# All matches are realpath-normalized before comparison (symlink protection).

# HP-1 — Protected Paths (deny Write-family + Bash-to-path)
# Override via OV-1 gate=protected-path
protected_paths:
  glob:
    - ".claude/settings.json"
    - ".claude/settings.local.json"
    - ".claude/settings-*.json"
    - ".tad/hooks/**"
    - ".tad/skills/**/SKILL.md"
    - ".claude/skills/**/SKILL.md"
    - ".tad/state/**"
    - ".tad/schemas/**"
  exact:
    - "~/.claude/settings.json"
  name_pattern:
    # Files matching any of these basenames anywhere
    - "hardened-*.sh"

# AC17: Gate verdict append-only allowlist (carve-out from protected_paths)
# Blake /gate writer + acceptance_protocol need to write here.
# Allowed: append new rows. Denied: overwrite existing PASS lines (prevents
# tampering with archived handoff gate3 verdicts).
gate_verdict_allowlist:
  - ".tad/evidence/gates/*/gate2-verdict.tsv"
  - ".tad/evidence/gates/*/gate3-verdict.tsv"
  - ".tad/evidence/gates/*/gate4-verdict.tsv"

# BW-3 — Bash write-path denylist (deny cp/mv/ln/tee/redirect/touch/sed -i/interpreter-write
# that lands in these prefixes). Enforced by path-guard.sh Bash branch.
bash_write_protected_prefix:
  - ".tad/evidence/"
  - ".tad/active/handoffs/"

# HP-2 — Env injection pattern denylist (21 patterns)
# Applies to Write-family content AND Bash commands.
env_injection_patterns:
  - "TAD_SKIP_VALIDATION="
  - "TAD_DISABLE_HOOKS="
  - "CLAUDE_SETTINGS_PATH="
  - "CLAUDE_CONFIG_DIR="
  - "BASH_ENV="
  - "ENV="
  - "SHELLOPTS="
  - "PS4="
  - "IFS="
  - "PERL5OPT="
  - "PERL5LIB="
  - "AWKPATH="
  - "PYTHONSTARTUP="
  - "PYTHONPATH="
  - "NODE_OPTIONS="
  - "LD_PRELOAD="
  - "DYLD_INSERT_LIBRARIES="
  - "DYLD_LIBRARY_PATH="
  - "GIT_EXTERNAL_DIFF="
  - "GIT_SSH_COMMAND="
  - "GIT_PROXY_COMMAND="

# PT-1 — Path traversal marker (after canonicalization)
path_traversal_segments:
  - ".."
