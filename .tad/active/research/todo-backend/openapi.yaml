openapi: 3.1.0
info:
  title: Todo App API
  version: 1.0.0
  description: |
    RESTful API for a Todo application with user management, task tracking,
    and category organization. Supports JWT authentication with role-based
    access control (Owner and Member roles).
  contact:
    name: API Support
    email: support@todoapp.example.com
  license:
    name: MIT
    identifier: MIT

servers:
  - url: http://localhost:3000/v1
    description: Development server
  - url: https://staging-api.todoapp.example.com/v1
    description: Staging server
  - url: https://api.todoapp.example.com/v1
    description: Production server

security:
  - BearerAuth: []

tags:
  - name: Auth
    description: Authentication and token management
  - name: Users
    description: User profile and management
  - name: Todos
    description: Todo CRUD and filtering
  - name: Categories
    description: User-defined category management

paths:
  /auth/register:
    post:
      operationId: registerUser
      tags: [Auth]
      summary: Register a new user
      description: Creates a new user account and returns access + refresh tokens.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              email: "alice@example.com"
              password: "SecureP@ss123"
              name: "Alice Johnson"
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                refreshToken: "dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4..."
                expiresIn: 900
                user:
                  id: "clxyz123abc"
                  email: "alice@example.com"
                  name: "Alice Johnson"
                  role: "member"
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              example:
                type: "https://todoapp.example.com/errors/resource-already-exists"
                title: "Conflict"
                status: 409
                detail: "A user with this email already exists."

  /auth/login:
    post:
      operationId: loginUser
      tags: [Auth]
      summary: Login with email and password
      description: Authenticates a user and returns access + refresh tokens.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: "alice@example.com"
              password: "SecureP@ss123"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                refreshToken: "dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4..."
                expiresIn: 900
                user:
                  id: "clxyz123abc"
                  email: "alice@example.com"
                  name: "Alice Johnson"
                  role: "member"
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              example:
                type: "https://todoapp.example.com/errors/invalid-credentials"
                title: "Unauthorized"
                status: 401
                detail: "Invalid email or password."

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [Auth]
      summary: Refresh access token
      description: Uses a valid refresh token to obtain a new access token. The old refresh token is invalidated (rotation).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
            example:
              refreshToken: "dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4..."
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              example:
                accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.newtoken..."
                refreshToken: "bmV3IHJlZnJlc2ggdG9rZW4..."
                expiresIn: 900
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      operationId: logoutUser
      tags: [Auth]
      summary: Logout and invalidate refresh token
      description: Invalidates the current refresh token, effectively logging the user out.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
            example:
              refreshToken: "dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4..."
      responses:
        '204':
          description: Logged out successfully
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me:
    get:
      operationId: getCurrentUser
      tags: [Users]
      summary: Get current user profile
      description: Returns the profile of the currently authenticated user.
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              example:
                id: "clxyz123abc"
                email: "alice@example.com"
                name: "Alice Johnson"
                role: "member"
                createdAt: "2026-03-15T10:30:00Z"
                updatedAt: "2026-03-20T14:00:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      operationId: updateCurrentUser
      tags: [Users]
      summary: Update current user profile
      description: Updates the name or password of the currently authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
            example:
              name: "Alice J."
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users:
    get:
      operationId: listUsers
      tags: [Users]
      summary: List all users (Owner only)
      description: Returns a paginated list of all users. Requires Owner role.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated list of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUsers'
              example:
                data:
                  - id: "clxyz123abc"
                    email: "alice@example.com"
                    name: "Alice Johnson"
                    role: "member"
                    createdAt: "2026-03-15T10:30:00Z"
                    updatedAt: "2026-03-20T14:00:00Z"
                meta:
                  total: 25
                  page: 1
                  pageSize: 20
                  totalPages: 2
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /users/{userId}:
    get:
      operationId: getUserById
      tags: [Users]
      summary: Get user by ID (Owner only)
      description: Returns a specific user's profile. Requires Owner role.
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteUser
      tags: [Users]
      summary: Delete user (Owner only)
      description: Soft-deletes a user account. Requires Owner role.
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '204':
          description: User deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /todos:
    get:
      operationId: listTodos
      tags: [Todos]
      summary: List todos with filtering
      description: |
        Returns a paginated list of todos. Members see only their own todos.
        Owners can see all todos (use `userId` filter to scope).
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: status
          in: query
          description: Filter by completion status
          schema:
            type: string
            enum: [pending, completed]
        - name: categoryId
          in: query
          description: Filter by category ID
          schema:
            type: string
        - name: priority
          in: query
          description: Filter by priority level
          schema:
            type: string
            enum: [low, medium, high, urgent]
        - name: dueBefore
          in: query
          description: Filter todos due before this date (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: dueAfter
          in: query
          description: Filter todos due after this date (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: search
          in: query
          description: Search in todo title (case-insensitive contains)
          schema:
            type: string
        - name: sort
          in: query
          description: Sort field
          schema:
            type: string
            enum: [createdAt, dueDate, priority, title]
            default: createdAt
        - name: order
          in: query
          description: Sort order
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Paginated list of todos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTodos'
              example:
                data:
                  - id: "cltodo001"
                    title: "Buy groceries"
                    description: "Milk, eggs, bread"
                    completed: false
                    priority: "medium"
                    dueDate: "2026-04-05T18:00:00Z"
                    categoryId: "clcat001"
                    userId: "clxyz123abc"
                    createdAt: "2026-04-01T09:00:00Z"
                    updatedAt: "2026-04-01T09:00:00Z"
                meta:
                  total: 42
                  page: 1
                  pageSize: 20
                  totalPages: 3
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createTodo
      tags: [Todos]
      summary: Create a new todo
      description: Creates a new todo for the authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTodoRequest'
            example:
              title: "Buy groceries"
              description: "Milk, eggs, bread"
              priority: "medium"
              dueDate: "2026-04-05T18:00:00Z"
              categoryId: "clcat001"
      responses:
        '201':
          description: Todo created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /todos/{todoId}:
    get:
      operationId: getTodoById
      tags: [Todos]
      summary: Get todo by ID
      description: Returns a specific todo. Members can only access their own todos.
      parameters:
        - $ref: '#/components/parameters/TodoIdParam'
      responses:
        '200':
          description: Todo found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
              example:
                id: "cltodo001"
                title: "Buy groceries"
                description: "Milk, eggs, bread"
                completed: false
                priority: "medium"
                dueDate: "2026-04-05T18:00:00Z"
                categoryId: "clcat001"
                userId: "clxyz123abc"
                createdAt: "2026-04-01T09:00:00Z"
                updatedAt: "2026-04-01T09:00:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateTodo
      tags: [Todos]
      summary: Update a todo
      description: Partially updates a todo. Members can only update their own todos.
      parameters:
        - $ref: '#/components/parameters/TodoIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTodoRequest'
            example:
              completed: true
      responses:
        '200':
          description: Todo updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteTodo
      tags: [Todos]
      summary: Delete a todo
      description: Deletes a todo. Members can only delete their own todos.
      parameters:
        - $ref: '#/components/parameters/TodoIdParam'
      responses:
        '204':
          description: Todo deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /categories:
    get:
      operationId: listCategories
      tags: [Categories]
      summary: List user's categories
      description: Returns all categories belonging to the authenticated user.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated list of categories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCategories'
              example:
                data:
                  - id: "clcat001"
                    name: "Shopping"
                    color: "#FF6B6B"
                    userId: "clxyz123abc"
                    createdAt: "2026-03-15T10:00:00Z"
                    updatedAt: "2026-03-15T10:00:00Z"
                meta:
                  total: 5
                  page: 1
                  pageSize: 20
                  totalPages: 1
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createCategory
      tags: [Categories]
      summary: Create a new category
      description: Creates a new category for the authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
            example:
              name: "Shopping"
              color: "#FF6B6B"
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Category name already exists for this user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /categories/{categoryId}:
    get:
      operationId: getCategoryById
      tags: [Categories]
      summary: Get category by ID
      description: Returns a specific category. Users can only access their own categories.
      parameters:
        - $ref: '#/components/parameters/CategoryIdParam'
      responses:
        '200':
          description: Category found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateCategory
      tags: [Categories]
      summary: Update a category
      description: Updates a category. Users can only update their own categories.
      parameters:
        - $ref: '#/components/parameters/CategoryIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryRequest'
            example:
              name: "Groceries"
              color: "#51CF66"
      responses:
        '200':
          description: Category updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteCategory
      tags: [Categories]
      summary: Delete a category
      description: |
        Deletes a category. Todos in this category will have their categoryId set to null.
        Users can only delete their own categories.
      parameters:
        - $ref: '#/components/parameters/CategoryIdParam'
      responses:
        '204':
          description: Category deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT access token obtained from `/auth/login` or `/auth/register`.
        Include in the `Authorization` header as `Bearer {token}`.
        Access tokens expire after 15 minutes. Use `/auth/refresh` to obtain a new one.

  parameters:
    PageParam:
      name: page
      in: query
      description: Page number (1-indexed)
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeParam:
      name: pageSize
      in: query
      description: Number of items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    UserIdParam:
      name: userId
      in: path
      required: true
      description: User ID (CUID)
      schema:
        type: string
    TodoIdParam:
      name: todoId
      in: path
      required: true
      description: Todo ID (CUID)
      schema:
        type: string
    CategoryIdParam:
      name: categoryId
      in: path
      required: true
      description: Category ID (CUID)
      schema:
        type: string

  schemas:
    # === Auth Schemas ===
    RegisterRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
          description: User's email address
          example: "alice@example.com"
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 128
          description: Password (min 8 chars, must contain uppercase, lowercase, and number)
          example: "SecureP@ss123"
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: User's display name
          example: "Alice Johnson"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: "alice@example.com"
        password:
          type: string
          format: password
          example: "SecureP@ss123"

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          description: Refresh token obtained from login or previous refresh
          example: "dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4..."

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: JWT access token (15 min expiry)
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refreshToken:
          type: string
          description: Refresh token (7 day expiry, single-use with rotation)
          example: "dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4..."
        expiresIn:
          type: integer
          description: Access token TTL in seconds
          example: 900
        user:
          $ref: '#/components/schemas/User'

    TokenResponse:
      type: object
      properties:
        accessToken:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.newtoken..."
        refreshToken:
          type: string
          example: "bmV3IHJlZnJlc2ggdG9rZW4..."
        expiresIn:
          type: integer
          example: 900

    # === User Schemas ===
    User:
      type: object
      properties:
        id:
          type: string
          description: User ID (CUID)
          example: "clxyz123abc"
        email:
          type: string
          format: email
          example: "alice@example.com"
        name:
          type: string
          example: "Alice Johnson"
        role:
          type: string
          enum: [owner, member]
          example: "member"
        createdAt:
          type: string
          format: date-time
          example: "2026-03-15T10:30:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-03-20T14:00:00Z"

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: "Alice J."
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 128
          description: New password (requires currentPassword)
        currentPassword:
          type: string
          format: password
          description: Required when changing password

    # === Todo Schemas ===
    Todo:
      type: object
      properties:
        id:
          type: string
          example: "cltodo001"
        title:
          type: string
          example: "Buy groceries"
        description:
          type: ["string", "null"]
          example: "Milk, eggs, bread"
        completed:
          type: boolean
          example: false
        priority:
          type: string
          enum: [low, medium, high, urgent]
          example: "medium"
        dueDate:
          type: ["string", "null"]
          format: date-time
          example: "2026-04-05T18:00:00Z"
        categoryId:
          type: ["string", "null"]
          example: "clcat001"
        userId:
          type: string
          example: "clxyz123abc"
        createdAt:
          type: string
          format: date-time
          example: "2026-04-01T09:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-04-01T09:00:00Z"

    CreateTodoRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
          example: "Buy groceries"
        description:
          type: string
          maxLength: 2000
          example: "Milk, eggs, bread"
        priority:
          type: string
          enum: [low, medium, high, urgent]
          default: medium
          example: "medium"
        dueDate:
          type: string
          format: date-time
          example: "2026-04-05T18:00:00Z"
        categoryId:
          type: string
          example: "clcat001"

    UpdateTodoRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: ["string", "null"]
          maxLength: 2000
        completed:
          type: boolean
        priority:
          type: string
          enum: [low, medium, high, urgent]
        dueDate:
          type: ["string", "null"]
          format: date-time
        categoryId:
          type: ["string", "null"]

    # === Category Schemas ===
    Category:
      type: object
      properties:
        id:
          type: string
          example: "clcat001"
        name:
          type: string
          example: "Shopping"
        color:
          type: string
          description: Hex color code for UI display
          example: "#FF6B6B"
        userId:
          type: string
          example: "clxyz123abc"
        createdAt:
          type: string
          format: date-time
          example: "2026-03-15T10:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-03-15T10:00:00Z"

    CreateCategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          example: "Shopping"
        color:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
          description: Hex color code
          example: "#FF6B6B"

    UpdateCategoryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
        color:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"

    # === Common Schemas ===
    ProblemDetail:
      type: object
      description: RFC 7807 Problem Details
      required: [type, title, status, detail]
      properties:
        type:
          type: string
          format: uri
          description: URI identifying the error type
          example: "https://todoapp.example.com/errors/validation-failed"
        title:
          type: string
          description: Short human-readable summary
          example: "Validation Failed"
        status:
          type: integer
          description: HTTP status code
          example: 400
        detail:
          type: string
          description: Human-readable explanation
          example: "One or more fields failed validation."
        errors:
          type: array
          description: Field-level validation errors
          items:
            $ref: '#/components/schemas/FieldError'

    FieldError:
      type: object
      properties:
        field:
          type: string
          example: "email"
        message:
          type: string
          example: "Must be a valid email address."
        code:
          type: string
          example: "INVALID_FORMAT"

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
          example: 42
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 20
        totalPages:
          type: integer
          example: 3

    PaginatedUsers:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    PaginatedTodos:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Todo'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    PaginatedCategories:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Category'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

  responses:
    BadRequest:
      description: Invalid request data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: "https://todoapp.example.com/errors/validation-failed"
            title: "Bad Request"
            status: 400
            detail: "One or more fields failed validation."
            errors:
              - field: "email"
                message: "Must be a valid email address."
                code: "INVALID_FORMAT"
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: "https://todoapp.example.com/errors/invalid-token"
            title: "Unauthorized"
            status: 401
            detail: "Access token is missing, invalid, or expired."
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: "https://todoapp.example.com/errors/insufficient-permissions"
            title: "Forbidden"
            status: 403
            detail: "You do not have permission to access this resource."
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: "https://todoapp.example.com/errors/resource-not-found"
            title: "Not Found"
            status: 404
            detail: "The requested resource was not found."
