    ### Cross-Project Zombie Pattern: Framework-Level *cancel Adoption — 2026-06-05
    - **Context**: *evolve cross-project scan (10 projects, 3919 traces). TAD 21% zombie rate is the BEST — all downstream projects are worse (36-100%).
    - **Discovery**: *cancel was introduced in v2.15 but only the TAD main project has used it. Downstream projects accumulate zombie handoffs without a structured closure mechanism. The zombie pattern is framework-endemic, not project-specific. Root cause: *cancel is a behavioral workflow, not a mechanical tool — agents don't use it unless explicitly trained.
    - **Action**: (1) Add *cancel awareness to Blake's startup health check (mirror Alex STEP 3.55 zombie detection). (2) Consider adding a zombie count warning to SessionStart hook output so users see it every session. (3) Batch-archive legacy zombies in downstream projects during next *sync.

