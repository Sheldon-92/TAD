  current: "No zombie prevention knowledge entry exists"
  proposed: |
    ### Zombie Prevention: Cancel or Complete Before Pivot — 2026-06-05
    - **Context**: *optimize scan found 21% zombie rate (33/151 handoffs created but never completed), mostly from 2026-04 era experiments.
    - **Discovery**: Root cause is directional pivots without formal cancellation. Pre-v2.15 TAD had no *cancel mechanism, so abandoned spikes accumulated silently. 18 of 33 zombies are superseded-by-later-work type — the work happened under a different slug.
    - **Action**: When pivoting away from an in-progress handoff, always run *cancel with reason=superseded or reason=pivoted. For legacy zombies, batch-archive via *accept --quick.

