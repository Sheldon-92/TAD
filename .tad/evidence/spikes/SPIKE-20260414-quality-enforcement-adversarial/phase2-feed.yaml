known_gaps:
  - id: "KG-001"
    category: "evidence-forgery"
    fixture_id: "ef-004"
    severity: "P1"
    bypass_mechanism: |
      Staleness check requires handoff-file mtime context which is not available for standalone
      tmp-file validation. Validator detects stale evidence in production when run from a
      .tad/evidence/reviews/blake/<slug>/ path that matches an active handoff; static-tmp
      fixture harness cannot provide this context.
    poc_exploit: |
      1. Attacker runs validator directly on a detached .md file (outside expected reviews/blake/<slug>/ dir)
      2. Validator's parent_slug=$(basename $(dirname $file)) returns a name with no matching handoff
      3. Staleness check's `for hf in .tad/active/handoffs/HANDOFF-*-${parent_slug}.md; do` finds nothing
      4. Staleness check is skipped; stale evidence passes
      Demonstrated in ef-004 fixture: same content, same structure, but harness places it in a tmp dir.
    phase2_mitigation: |
      Option A (recommended): require validator invocation with explicit --handoff-path flag,
        reject if flag missing. Cost: ~2h (add arg parser + call-site updates in test-runner + all
        hook cross-calls in hardened-pretool-interceptor.sh).
      Option B: embed sha-manifest freshness markers in each evidence file (file must declare its
        "bound_handoff: <sha>" in YAML frontmatter; validator checks that handoff still has that sha).
        Cost: ~6h (schema + evidence-writer update + validator changes).

  - id: "KG-002"
    category: "toctou"
    fixture_id: "tc-001"
    severity: "P1"
    bypass_mechanism: |
      Runtime symlink-swap TOCTOU requires timing control between hook check (PreToolUse reads
      file_path, resolves to X) and kernel write (follows symlink at time-of-write, may resolve
      to Y). Static JSON envelope fixture cannot trigger the race; content is plain text with no
      forbidden pattern so hook correctly allows.
    poc_exploit: |
      Two-process attack:
      1. Process A: claude -p "write .tad/evidence/reviews/alex/X.md content"
      2. Process B (parallel): `while :; do ln -sfn /tmp/malicious /tad/evidence/reviews/alex/X.md; done`
      3. Hook sees file_path as .tad/evidence/reviews/alex/X.md, allows.
      4. Claude Code kernel follows the symlink at write time → writes to /tmp/malicious.
      Requires second process and timing luck; not representable as single stdin envelope.
    phase2_mitigation: |
      PostToolUse fs-audit hook that re-resolves paths via realpath() after write AND verifies
      the target inode is within .tad/evidence/. If not, revert and flag.
      Cost: ~4h (PostToolUse hook + revert logic + integration test).
      Alternative: lobby Claude Code core to expose realpath-on-write as a hook primitive.
      Out-of-scope for TAD framework.

# Design-requirement findings (not gaps; pre-Phase-2 corrections per Alex ack)
design_requirements:
  - id: "DR-001"
    topic: "sentinel_phrase_ambiguity"
    severity: "HIGH-VALUE (pre-Phase-2 design correction)"
    finding: |
      "message from blake" is a common English phrase that can appear in legitimate documentation
      (verified in Cat 1 sb-011 positive control: doc mentioning Blake by name). Aggressive
      normalization + substring match grows false-positive risk.
    recommendation: |
      Phase 2 MUST NOT rely on substring-match of "message from blake". Use structural anchors:
        - Primary: "📨 Message from Blake (Terminal 2)" emoji + box-drawing signature pattern
        - Secondary: file_path ∈ {.tad/active/handoffs/*, COMPLETION-*}
        - Tertiary: multi-field cross-reference (commit hash + handoff ID co-occurrence)
      Label as design-requirement, not "gap" — this is a pre-Phase-2 correction, not a post-hoc patch.

