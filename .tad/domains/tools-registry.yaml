# Domain Pack Tools Registry
# All domain packs reference this registry for tool definitions.
# Each tool has enough info for Claude to use it without prior knowledge.
registry_version: 1
last_updated: "2026-04-02"
maintainer: "TAD Framework"

# Pre-flight verification command (run before using any tool)
preflight: |
  for tool in typst pandoc python3 d2; do
    which $tool >/dev/null 2>&1 && echo "$tool: OK" || echo "$tool: NOT FOUND"
  done

capabilities:

  pdf_generation:
    description: "生成专业 PDF 文档（报告、one-pager、PRD）"
    recommended:
      name: typst
      type: cli
      install: "brew install typst"
      verify: "typst --version"
      usage: |
        1. Write .typ file with Typst markup
        2. Run: typst compile input.typ output.pdf
      example: |
        // report.typ
        #set page(paper: "a4", margin: 2cm)
        #set text(size: 11pt)
        = Product Analysis Report
        == Executive Summary
        This report analyzes the competitive landscape...
        #table(
          columns: (1fr, 1fr, 1fr),
          [Competitor], [Strength], [Weakness],
          [CompA], [Fast delivery], [High price],
          [CompB], [Low cost], [Limited features],
        )
      output_format: "PDF file"
      tested: true
      test_result: "39KB professional PDF with tables and styling"
    alternatives:
      - name: pandoc
        type: cli
        install: "brew install pandoc"
        verify: "pandoc --version"
        usage: "pandoc input.md --pdf-engine=typst -o output.pdf"
        note: "Accepts Markdown input, uses Typst as PDF engine"
        tested: true

  slideshow_generation:
    description: "Markdown → 可演示的幻灯片（HTML 或 PDF）"
    recommended:
      name: pandoc-revealjs
      type: cli
      install: "brew install pandoc (已内置)"
      verify: "pandoc --version"
      usage: "pandoc slides.md -t revealjs -s -o slides.html -V revealjs-url=https://unpkg.com/reveal.js"
      example: |
        ---
        title: Product Pitch
        ---
        # The Problem
        Users struggle with X...
        ---
        # Our Solution
        We built Y that...
        ---
        # Market Size
        The market is $Z billion...
      output_format: "HTML file (open in browser for presentation)"
      tested: true
      test_result: "7KB self-contained HTML slides"
    alternatives:
      - name: slidev
        type: cli
        install: "npm init slidev@latest"
        usage: "npx slidev build slides.md"
        note: "More polished Vue-rendered slides, needs Node.js ≥20"
      - name: gamma-mcp
        type: mcp-cloud
        note: "AI-generated presentations, see presentation_generation"

  diagram_generation:
    description: "生成架构图、流程图、定位图（SVG/PNG）"
    recommended:
      name: d2
      type: cli
      install: "brew install d2"
      verify: "d2 --version"
      usage: "d2 input.d2 output.svg (or output.png)"
      example: |
        # competitive-positioning.d2
        direction: right
        CompA: "Competitor A" {
          style.fill: "#ff6b6b"
          style.font-color: "#fff"
        }
        CompB: "Competitor B" {
          style.fill: "#ffd93d"
        }
        Us: "Our Product" {
          style.fill: "#51cf66"
          style.font-color: "#fff"
        }
        CompA -> Us: "lower price"
        CompB -> Us: "better UX"
      output_format: "SVG or PNG"
      tested: true
      test_result: "SVG diagram generated successfully"
      note: "Pure Go binary, no browser dependency (unlike Mermaid CLI)"
    alternatives:
      - name: python-matplotlib
        type: cli
        usage: "python3 script.py (for scatter/positioning plots)"
        note: "Better for data-driven positioning charts"
        tested: true
      - name: mermaid-ink
        type: api
        usage: "HTTP API: https://mermaid.ink/img/{base64}"
        note: "Mermaid syntax via HTTP, no local Puppeteer needed"

  data_chart:
    description: "生成数据图表（柱状图、饼图、趋势图、散点图）"
    recommended:
      name: python-matplotlib
      type: cli
      install: "python3 已内置 (pip install matplotlib if missing)"
      verify: "python3 -c 'import matplotlib; print(matplotlib.__version__)'"
      usage: |
        Write Python script using matplotlib/seaborn, run with python3.
        Save: plt.savefig('output.png', dpi=150, bbox_inches='tight')
      example: |
        import matplotlib; matplotlib.use('Agg')
        import matplotlib.pyplot as plt
        categories = ['CompA', 'CompB', 'Us']
        scores = [7, 5, 9]
        colors = ['#ff6b6b', '#ffd93d', '#51cf66']
        plt.bar(categories, scores, color=colors)
        plt.title('Feature Comparison')
        plt.ylabel('Score')
        plt.savefig('comparison.png', dpi=150, bbox_inches='tight')
      output_format: "PNG or SVG"
      tested: true
      test_result: "34KB PNG + 27KB SVG competitive chart"

  web_scraping:
    description: "结构化抓取网页内容（竞品页面、定价、评论）"
    recommended:
      name: jina-reader
      type: api
      install: "无需安装（通过 URL 前缀使用）"
      verify: "curl -s https://r.jina.ai/https://example.com | head -5"
      usage: "Use WebFetch tool with URL: https://r.jina.ai/{target_url}"
      example: "WebFetch https://r.jina.ai/https://competitor.com/pricing"
      output_format: "Clean Markdown text"
      note: "免费 10M tokens, 无需 API key, 零安装"
      tested: false
    alternatives:
      - name: firecrawl-mcp
        type: mcp
        install: "claude mcp add firecrawl -- npx firecrawl-mcp"
        usage: "crawl({url, format: 'markdown'})"
        note: "更强大（全站爬取, JSON schema提取），需 API key, 500 credits/月免费"
      - name: builtin-webfetch
        type: builtin
        usage: "WebFetch tool (already available)"
        note: "内置能力，直接可用，但不支持反爬绕过"

  wireframe_generation:
    description: "生成线框图/UI 原型"
    recommended:
      name: html-prototype
      type: builtin
      install: "无需安装"
      verify: "N/A (uses Write tool)"
      usage: "Generate HTML+CSS file with Write tool, open in browser"
      example: |
        Write an HTML file with embedded CSS:
        <!DOCTYPE html><html><head><style>
        .card { border: 1px solid #ddd; padding: 16px; border-radius: 8px; }
        </style></head><body>
        <div class="card"><h2>Feature Card</h2><p>Description...</p></div>
        </body></html>
      output_format: "HTML file (open in browser)"
      note: "最灵活，无限制，Claude 擅长生成 HTML+CSS"
    alternatives:
      - name: figma-mcp
        type: mcp
        install: "claude mcp add figma --transport http https://mcp.figma.com/mcp"
        usage: "Use Figma MCP tools to create frames, components"
        note: "专业级但免费版仅 6 次/月"

  email_sending:
    description: "发送验证材料、调研问卷给目标用户"
    recommended:
      name: gmail-mcp
      type: mcp-cloud
      install: "Claude.ai 内置，需 OAuth 授权"
      verify: "Call mcp__claude_ai_Gmail__authenticate"
      usage: "mcp__claude_ai_Gmail tools: search, read, draft, send"
      note: "支持附件、CC/BCC、HTML body"

  calendar_scheduling:
    description: "安排验证访谈、用户测试时间"
    recommended:
      name: google-calendar-mcp
      type: mcp-cloud
      install: "Claude.ai 内置，需 OAuth 授权"
      verify: "Call mcp__claude_ai_Google_Calendar tools"
      usage: |
        - gcal_find_my_free_time: 查找空闲时段
        - gcal_create_event: 创建事件
        - gcal_list_events: 列出日程

  presentation_generation:
    description: "生成精美演示文稿/pitch deck（AI 驱动）"
    recommended:
      name: gamma-mcp
      type: mcp-cloud
      install: "Claude.ai 内置，需 OAuth 授权"
      verify: "Call mcp__claude_ai_Gamma__authenticate"
      usage: "Gamma MCP tools for AI-generated presentations with themes"
      note: "最美观选择，需 Gamma 账号，免费计划有限制"
    alternatives:
      - name: pandoc-revealjs
        type: cli
        note: "见 slideshow_generation（本地，无限制）"

  poster_design:
    description: "生成海报、one-pager、社交媒体设计"
    recommended:
      name: canva-mcp
      type: mcp-cloud
      install: "Claude.ai 内置，需 OAuth 授权"
      verify: "Call mcp__claude_ai_Canva__authenticate"
      usage: "Canva MCP tools for design creation with brand kit"
      note: "专业设计，支持品牌套件，免费计划限制多"
    alternatives:
      - name: typst
        type: cli
        note: "用 Typst 排版 PDF one-pager（不如 Canva 美观但无限制）"

  docx_generation:
    description: "生成 Word 文档（用于分享给非技术人员）"
    recommended:
      name: pandoc
      type: cli
      install: "brew install pandoc (已内置)"
      verify: "pandoc --version"
      usage: "pandoc input.md -o output.docx"
      example: "pandoc PRD.md -o PRD.docx --reference-doc=template.docx"
      output_format: "DOCX file"
      tested: true
      test_result: "11KB DOCX from Markdown"
    alternatives:
      - name: typst
        type: cli
        note: "Typst 只输出 PDF，不支持 DOCX"

  accessibility_check:
    description: "WCAG 2.1 AA 可访问性自动检查（对比度、标签、ARIA）"
    recommended:
      name: pa11y
      type: cli
      install: "npx pa11y (auto-downloads, bundles own Puppeteer)"
      verify: "npx pa11y --version"
      usage: |
        1. Write HTML file to test
        2. Run: npx pa11y "file:///path/to/file.html" --reporter json
        3. Parse JSON output for violations
      example: |
        npx pa11y "file:///tmp/test.html" --reporter json
        Output: [{"code":"WCAG2AA.Principle1.Guideline1_4.1_4_3.G18.Fail",
                  "type":"error","message":"Insufficient contrast..."}]
      output_format: "JSON array of WCAG violations"
      tested: true
      test_result: "Caught contrast violations + missing alt attributes"
      note: "Bundles own Chromium via Puppeteer, no global browser needed"

  design_tokens:
    description: "Design Token 管理 — JSON → CSS 变量/SCSS/Less/iOS/Android"
    recommended:
      name: style-dictionary
      type: cli
      install: "npx style-dictionary (auto-downloads)"
      verify: "npx style-dictionary --version"
      usage: |
        1. Create tokens.json with design token definitions
        2. Create sd-config.json pointing to tokens + output format
        3. Run: npx style-dictionary build --config sd-config.json
      example: |
        // tokens.json
        {"color":{"primary":{"value":"#0066cc"},"text":{"value":"#333333"}},
         "spacing":{"sm":{"value":"8px"},"md":{"value":"16px"}}}
        // sd-config.json
        {"source":["tokens.json"],"platforms":{"css":{
          "transformGroup":"css","buildPath":"build/",
          "files":[{"destination":"variables.css","format":"css/variables"}]}}}
        // Run
        npx style-dictionary build --config sd-config.json
        // Output: build/variables.css with :root { --color-primary: #0066cc; ... }
      output_format: "CSS variables, SCSS, Less, Android XML, iOS Swift"
      tested: true
      test_result: "Clean CSS variables output from JSON tokens"
      note: "No browser dependency. Supports multi-platform output."

  svg_optimization:
    description: "SVG 文件优化（去冗余、压缩、精简属性）"
    recommended:
      name: svgo
      type: cli
      install: "npx svgo (auto-downloads)"
      verify: "npx svgo --version"
      usage: "npx svgo input.svg -o output.min.svg"
      example: |
        npx svgo diagram.svg -o diagram.min.svg
        # 484 bytes -> 269 bytes (44% reduction, 17ms)
      output_format: "Optimized SVG file"
      tested: true
      test_result: "44% size reduction on test SVG"
      note: "No browser dependency. Fast. Good for D2 output post-processing."

  html_screenshot:
    description: "HTML → PNG 截图（用于 PDF 嵌入、视觉审查）"
    recommended:
      name: playwright-screenshot
      type: cli
      install: "npm install -g playwright && npx playwright install chromium"
      verify: "playwright --version"
      usage: |
        playwright screenshot "file:///path/to/file.html" output.png --full-page
        Options: --device "iPhone 11", --color-scheme dark, --viewport-size 1440,900
      example: |
        playwright screenshot "file:///tmp/wireframe.html" wireframe.png --full-page
        # Output: 1280x720 PNG, ~18KB
      output_format: "PNG screenshot"
      tested: true
      test_result: "18KB PNG from simple HTML page"
      note: "Requires one-time Chromium install (~210MB). Supports device emulation."

  # ═══════════════════════════════════════
  # Web Frontend Tools (added 2026-04-02)
  # ═══════════════════════════════════════

  project_scaffold:
    description: "Create new frontend project with framework, TypeScript, linting, styling pre-configured"
    recommended:
      name: create-next-app
      type: cli
      install: "npx create-next-app@latest (auto-downloads)"
      verify: "N/A (scaffolds a new project directory)"
      usage: |
        npx create-next-app@latest my-app --typescript --tailwind --eslint --app --src-dir --use-npm
        Options:
          --typescript   Enable TypeScript
          --tailwind     Enable Tailwind CSS
          --eslint       Enable ESLint
          --app          Use App Router (not Pages Router)
          --src-dir      Use src/ directory
          --use-npm      Use npm (default is ask)
          --no-git       Skip git init
      example: |
        npx create-next-app@latest todo-app --typescript --tailwind --eslint --app --src-dir --use-npm
        # Creates:
        # todo-app/
        # ├── src/app/          (App Router pages)
        # │   ├── layout.tsx
        # │   ├── page.tsx
        # │   └── globals.css
        # ├── public/
        # ├── tsconfig.json
        # ├── tailwind.config.ts
        # ├── next.config.ts
        # └── package.json
      output_format: "Complete project directory"
      tested: true
      test_result: "Full Next.js project scaffolded in ~20s with TS + Tailwind + ESLint + App Router"
    alternatives:
      - name: create-vite
        type: cli
        install: "npm create vite@latest (auto-downloads)"
        usage: "npm create vite@latest my-app -- --template react-ts"
        note: "Lighter weight, no SSR by default. Best for SPA/client-only apps."

  component_library:
    description: "Add pre-built, customizable UI components to a project (shadcn/ui)"
    recommended:
      name: shadcn
      type: cli
      install: "npx shadcn@latest (auto-downloads)"
      verify: "N/A (works via npx)"
      usage: |
        1. Initialize in project root: npx shadcn@latest init -d
           (-d flag auto-detects framework config)
        2. Add components: npx shadcn@latest add button card input form dialog
        3. Components are copied to src/components/ui/ (you own the code)
      example: |
        # Initialize shadcn in a Next.js project
        npx shadcn@latest init -d
        # Output: Created button.tsx + utils.ts

        # Add specific components
        npx shadcn@latest add card input dialog table
        # Output: Created card.tsx, input.tsx, dialog.tsx, table.tsx in src/components/ui/

        # Use in code:
        import { Button } from "@/components/ui/button"
        import { Card, CardHeader, CardTitle, CardContent } from "@/components/ui/card"
      output_format: "React component files in src/components/ui/"
      tested: true
      test_result: "Init created button.tsx + utils.ts; add created card.tsx + input.tsx"
      note: "Components are copied to your project (not a dependency). You can customize freely."

  api_type_generation:
    description: "Generate TypeScript types from OpenAPI/Swagger spec"
    recommended:
      name: openapi-typescript
      type: cli
      install: "npx openapi-typescript (auto-downloads)"
      verify: "npx openapi-typescript --version"
      usage: |
        npx openapi-typescript api-spec.yaml -o src/lib/api-types.ts
        Accepts: OpenAPI 3.0/3.1 YAML or JSON
        Output: TypeScript interfaces for all paths, components, operations
      example: |
        # From a local spec file:
        npx openapi-typescript api.yaml -o src/lib/api-types.ts

        # From a remote URL:
        npx openapi-typescript https://api.example.com/openapi.json -o src/lib/api-types.ts

        # Generated output includes:
        export interface paths {
          "/todos": {
            get: { responses: { 200: { content: { "application/json": components["schemas"]["Todo"][] } } } }
          }
        }
        export interface components {
          schemas: { Todo: { id: number; title: string; completed: boolean } }
        }
      output_format: "TypeScript definition file (.ts)"
      tested: true
      test_result: "Generated typed interfaces from OpenAPI YAML in 21ms"
      note: "Auto-downloads via npx, no global install. Supports OpenAPI 3.0 and 3.1."

  code_linting:
    description: "Static code analysis for JavaScript/TypeScript (ESLint)"
    recommended:
      name: eslint
      type: cli
      install: "Included with create-next-app. Or: npm install -D eslint @eslint/js"
      verify: "npx eslint --version"
      usage: |
        npx eslint .                        # Check all files
        npx eslint . --fix                  # Auto-fix fixable issues
        npx eslint . --max-warnings 0       # Fail on warnings too
        npx eslint src/app/page.tsx         # Check single file
      example: |
        # Check entire project
        npx eslint .
        # Output: (empty = no errors)

        # Check with strict mode
        npx eslint . --max-warnings 0
        # Output: ✖ 0 problems (0 errors, 0 warnings)
      output_format: "Terminal output with file:line:col error/warning messages"
      tested: true
      test_result: "Zero errors on fresh Next.js scaffold"
      note: "Comes pre-configured with create-next-app. ESLint v10+ uses flat config."

  type_checking:
    description: "TypeScript static type checking without emitting files"
    recommended:
      name: typescript
      type: cli
      install: "Included with create-next-app. Or: npm install -D typescript"
      verify: "npx tsc --version"
      usage: |
        npx tsc --noEmit                    # Type-check without output files
        npx tsc --noEmit --pretty           # Colored output
        npx tsc --noEmit -p tsconfig.json   # Explicit config
      example: |
        # Type-check entire project
        npx tsc --noEmit
        # Output: (empty = no errors)

        # With errors:
        # src/app/page.tsx(5,3): error TS2322: Type 'string' is not assignable to type 'number'.
      output_format: "Terminal output with file(line,col): error messages"
      tested: true
      test_result: "Zero errors on fresh Next.js + shadcn project"
      note: "tsconfig.json comes with create-next-app. Strict mode recommended."

  code_formatting:
    description: "Consistent code formatting for JS/TS/CSS/JSON (Prettier)"
    recommended:
      name: prettier
      type: cli
      install: "npm install -D prettier"
      verify: "npx prettier --version"
      usage: |
        npx prettier --check .              # Check formatting (exit 1 if issues)
        npx prettier --write .              # Auto-format all files
        npx prettier --check "src/**/*.tsx" # Check specific pattern
      example: |
        # Check formatting
        npx prettier --check "src/**/*.{ts,tsx}"
        # Output: Checking formatting...
        #   src/components/ui/button.tsx
        #   Code style issues found in 1 file. Run Prettier with --write to fix.

        # Fix formatting
        npx prettier --write "src/**/*.{ts,tsx}"
      output_format: "Terminal output listing files with issues"
      tested: true
      test_result: "Correctly detects formatting differences in shadcn-generated components"
      note: "v3.8.1 tested. Add .prettierrc for project-specific rules."

  bundle_analysis:
    description: "Visualize JavaScript bundle size and composition"
    status: experimental  # Not tested end-to-end (requires project with real bundle)
    recommended:
      name: vite-bundle-visualizer
      type: cli
      install: "npx vite-bundle-visualizer (for Vite projects)"
      verify: "N/A (runs via npx)"
      usage: |
        # For Next.js (which uses Turbopack/webpack):
        ANALYZE=true npm run build
        # (requires @next/bundle-analyzer plugin in next.config.ts)

        # For Vite projects:
        npx vite-bundle-visualizer
      example: |
        # Next.js bundle analysis setup:
        # 1. Install: npm install -D @next/bundle-analyzer
        # 2. In next.config.ts:
        import withBundleAnalyzer from '@next/bundle-analyzer';
        const config = withBundleAnalyzer({ enabled: process.env.ANALYZE === 'true' })({
          // ... next config
        });
        export default config;
        # 3. Run: ANALYZE=true npm run build
        # 4. Opens browser with interactive treemap
      output_format: "HTML treemap visualization in browser"
      tested: false
      test_result: "Not tested (requires project with actual bundle)"
      note: "For Next.js use @next/bundle-analyzer. For Vite use vite-bundle-visualizer. Note: Next.js config may use CJS (require) or ESM (import) syntax depending on project setup."

  build_verification:
    description: "Verify production build succeeds (Next.js)"
    recommended:
      name: next-build
      type: cli
      install: "Included with create-next-app"
      verify: "N/A (npm script)"
      usage: |
        npm run build                       # Full production build
        # Checks: TypeScript, ESLint, page rendering, static generation
      example: |
        npm run build
        # Output:
        # ✓ Linting and checking validity of types
        # ✓ Creating an optimized production build
        # ✓ Generating static pages (4/4)
        # Route (app)
        # ┌ ○ /
        # └ ○ /_not-found
        # ○ (Static) prerendered as static content
      output_format: "Terminal output with route summary"
      tested: true
      test_result: "Build succeeds, outputs static pages with route summary"
      note: "npm run build is the single most comprehensive check — includes tsc + eslint + render."
