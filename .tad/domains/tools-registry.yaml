# Domain Pack Tools Registry
# All domain packs reference this registry for tool definitions.
# Each tool has enough info for Claude to use it without prior knowledge.
registry_version: 1
last_updated: "2026-04-02"
maintainer: "TAD Framework"

# Pre-flight verification command (run before using any tool)
preflight: |
  for tool in typst pandoc python3 d2; do
    which $tool >/dev/null 2>&1 && echo "$tool: OK" || echo "$tool: NOT FOUND"
  done

capabilities:

  pdf_generation:
    description: "生成专业 PDF 文档（报告、one-pager、PRD）"
    recommended:
      name: typst
      type: cli
      install: "brew install typst"
      verify: "typst --version"
      usage: |
        1. Write .typ file with Typst markup
        2. Run: typst compile input.typ output.pdf
      example: |
        // report.typ
        #set page(paper: "a4", margin: 2cm)
        #set text(size: 11pt)
        = Product Analysis Report
        == Executive Summary
        This report analyzes the competitive landscape...
        #table(
          columns: (1fr, 1fr, 1fr),
          [Competitor], [Strength], [Weakness],
          [CompA], [Fast delivery], [High price],
          [CompB], [Low cost], [Limited features],
        )
      output_format: "PDF file"
      tested: true
      test_result: "39KB professional PDF with tables and styling"
    alternatives:
      - name: pandoc
        type: cli
        install: "brew install pandoc"
        verify: "pandoc --version"
        usage: "pandoc input.md --pdf-engine=typst -o output.pdf"
        note: "Accepts Markdown input, uses Typst as PDF engine"
        tested: true

  slideshow_generation:
    description: "Markdown → 可演示的幻灯片（HTML 或 PDF）"
    recommended:
      name: pandoc-revealjs
      type: cli
      install: "brew install pandoc (已内置)"
      verify: "pandoc --version"
      usage: "pandoc slides.md -t revealjs -s -o slides.html -V revealjs-url=https://unpkg.com/reveal.js"
      example: |
        ---
        title: Product Pitch
        ---
        # The Problem
        Users struggle with X...
        ---
        # Our Solution
        We built Y that...
        ---
        # Market Size
        The market is $Z billion...
      output_format: "HTML file (open in browser for presentation)"
      tested: true
      test_result: "7KB self-contained HTML slides"
    alternatives:
      - name: slidev
        type: cli
        install: "npm init slidev@latest"
        usage: "npx slidev build slides.md"
        note: "More polished Vue-rendered slides, needs Node.js ≥20"
      - name: gamma-mcp
        type: mcp-cloud
        note: "AI-generated presentations, see presentation_generation"

  diagram_generation:
    description: "生成架构图、流程图、定位图（SVG/PNG）"
    recommended:
      name: d2
      type: cli
      install: "brew install d2"
      verify: "d2 --version"
      usage: "d2 input.d2 output.svg (or output.png)"
      example: |
        # competitive-positioning.d2
        direction: right
        CompA: "Competitor A" {
          style.fill: "#ff6b6b"
          style.font-color: "#fff"
        }
        CompB: "Competitor B" {
          style.fill: "#ffd93d"
        }
        Us: "Our Product" {
          style.fill: "#51cf66"
          style.font-color: "#fff"
        }
        CompA -> Us: "lower price"
        CompB -> Us: "better UX"
      output_format: "SVG or PNG"
      tested: true
      test_result: "SVG diagram generated successfully"
      note: "Pure Go binary, no browser dependency (unlike Mermaid CLI)"
    alternatives:
      - name: python-matplotlib
        type: cli
        usage: "python3 script.py (for scatter/positioning plots)"
        note: "Better for data-driven positioning charts"
        tested: true
      - name: mermaid-ink
        type: api
        usage: "HTTP API: https://mermaid.ink/img/{base64}"
        note: "Mermaid syntax via HTTP, no local Puppeteer needed"

  data_chart:
    description: "生成数据图表（柱状图、饼图、趋势图、散点图）"
    recommended:
      name: python-matplotlib
      type: cli
      install: "python3 已内置 (pip install matplotlib if missing)"
      verify: "python3 -c 'import matplotlib; print(matplotlib.__version__)'"
      usage: |
        Write Python script using matplotlib/seaborn, run with python3.
        Save: plt.savefig('output.png', dpi=150, bbox_inches='tight')
      example: |
        import matplotlib; matplotlib.use('Agg')
        import matplotlib.pyplot as plt
        categories = ['CompA', 'CompB', 'Us']
        scores = [7, 5, 9]
        colors = ['#ff6b6b', '#ffd93d', '#51cf66']
        plt.bar(categories, scores, color=colors)
        plt.title('Feature Comparison')
        plt.ylabel('Score')
        plt.savefig('comparison.png', dpi=150, bbox_inches='tight')
      output_format: "PNG or SVG"
      tested: true
      test_result: "34KB PNG + 27KB SVG competitive chart"

  web_scraping:
    description: "结构化抓取网页内容（竞品页面、定价、评论）"
    recommended:
      name: jina-reader
      type: api
      install: "无需安装（通过 URL 前缀使用）"
      verify: "curl -s https://r.jina.ai/https://example.com | head -5"
      usage: "Use WebFetch tool with URL: https://r.jina.ai/{target_url}"
      example: "WebFetch https://r.jina.ai/https://competitor.com/pricing"
      output_format: "Clean Markdown text"
      note: "免费 10M tokens, 无需 API key, 零安装"
      tested: false
    alternatives:
      - name: firecrawl-mcp
        type: mcp
        install: "claude mcp add firecrawl -- npx firecrawl-mcp"
        usage: "crawl({url, format: 'markdown'})"
        note: "更强大（全站爬取, JSON schema提取），需 API key, 500 credits/月免费"
      - name: builtin-webfetch
        type: builtin
        usage: "WebFetch tool (already available)"
        note: "内置能力，直接可用，但不支持反爬绕过"

  wireframe_generation:
    description: "生成线框图/UI 原型"
    recommended:
      name: html-prototype
      type: builtin
      install: "无需安装"
      verify: "N/A (uses Write tool)"
      usage: "Generate HTML+CSS file with Write tool, open in browser"
      example: |
        Write an HTML file with embedded CSS:
        <!DOCTYPE html><html><head><style>
        .card { border: 1px solid #ddd; padding: 16px; border-radius: 8px; }
        </style></head><body>
        <div class="card"><h2>Feature Card</h2><p>Description...</p></div>
        </body></html>
      output_format: "HTML file (open in browser)"
      note: "最灵活，无限制，Claude 擅长生成 HTML+CSS"
    alternatives:
      - name: figma-mcp
        type: mcp
        install: "claude mcp add figma --transport http https://mcp.figma.com/mcp"
        usage: "Use Figma MCP tools to create frames, components"
        note: "专业级但免费版仅 6 次/月"

  email_sending:
    description: "发送验证材料、调研问卷给目标用户"
    recommended:
      name: gmail-mcp
      type: mcp-cloud
      install: "Claude.ai 内置，需 OAuth 授权"
      verify: "Call mcp__claude_ai_Gmail__authenticate"
      usage: "mcp__claude_ai_Gmail tools: search, read, draft, send"
      note: "支持附件、CC/BCC、HTML body"

  calendar_scheduling:
    description: "安排验证访谈、用户测试时间"
    recommended:
      name: google-calendar-mcp
      type: mcp-cloud
      install: "Claude.ai 内置，需 OAuth 授权"
      verify: "Call mcp__claude_ai_Google_Calendar tools"
      usage: |
        - gcal_find_my_free_time: 查找空闲时段
        - gcal_create_event: 创建事件
        - gcal_list_events: 列出日程

  presentation_generation:
    description: "生成精美演示文稿/pitch deck（AI 驱动）"
    recommended:
      name: gamma-mcp
      type: mcp-cloud
      install: "Claude.ai 内置，需 OAuth 授权"
      verify: "Call mcp__claude_ai_Gamma__authenticate"
      usage: "Gamma MCP tools for AI-generated presentations with themes"
      note: "最美观选择，需 Gamma 账号，免费计划有限制"
    alternatives:
      - name: pandoc-revealjs
        type: cli
        note: "见 slideshow_generation（本地，无限制）"

  poster_design:
    description: "生成海报、one-pager、社交媒体设计"
    recommended:
      name: canva-mcp
      type: mcp-cloud
      install: "Claude.ai 内置，需 OAuth 授权"
      verify: "Call mcp__claude_ai_Canva__authenticate"
      usage: "Canva MCP tools for design creation with brand kit"
      note: "专业设计，支持品牌套件，免费计划限制多"
    alternatives:
      - name: typst
        type: cli
        note: "用 Typst 排版 PDF one-pager（不如 Canva 美观但无限制）"

  docx_generation:
    description: "生成 Word 文档（用于分享给非技术人员）"
    recommended:
      name: pandoc
      type: cli
      install: "brew install pandoc (已内置)"
      verify: "pandoc --version"
      usage: "pandoc input.md -o output.docx"
      example: "pandoc PRD.md -o PRD.docx --reference-doc=template.docx"
      output_format: "DOCX file"
      tested: true
      test_result: "11KB DOCX from Markdown"
    alternatives:
      - name: typst
        type: cli
        note: "Typst 只输出 PDF，不支持 DOCX"

  accessibility_check:
    description: "WCAG 2.1 AA 可访问性自动检查（对比度、标签、ARIA）"
    recommended:
      name: pa11y
      type: cli
      install: "npx pa11y (auto-downloads, bundles own Puppeteer)"
      verify: "npx pa11y --version"
      usage: |
        1. Write HTML file to test
        2. Run: npx pa11y "file:///path/to/file.html" --reporter json
        3. Parse JSON output for violations
      example: |
        npx pa11y "file:///tmp/test.html" --reporter json
        Output: [{"code":"WCAG2AA.Principle1.Guideline1_4.1_4_3.G18.Fail",
                  "type":"error","message":"Insufficient contrast..."}]
      output_format: "JSON array of WCAG violations"
      tested: true
      test_result: "Caught contrast violations + missing alt attributes"
      note: "Bundles own Chromium via Puppeteer, no global browser needed"

  design_tokens:
    description: "Design Token 管理 — JSON → CSS 变量/SCSS/Less/iOS/Android"
    recommended:
      name: style-dictionary
      type: cli
      install: "npx style-dictionary (auto-downloads)"
      verify: "npx style-dictionary --version"
      usage: |
        1. Create tokens.json with design token definitions
        2. Create sd-config.json pointing to tokens + output format
        3. Run: npx style-dictionary build --config sd-config.json
      example: |
        // tokens.json
        {"color":{"primary":{"value":"#0066cc"},"text":{"value":"#333333"}},
         "spacing":{"sm":{"value":"8px"},"md":{"value":"16px"}}}
        // sd-config.json
        {"source":["tokens.json"],"platforms":{"css":{
          "transformGroup":"css","buildPath":"build/",
          "files":[{"destination":"variables.css","format":"css/variables"}]}}}
        // Run
        npx style-dictionary build --config sd-config.json
        // Output: build/variables.css with :root { --color-primary: #0066cc; ... }
      output_format: "CSS variables, SCSS, Less, Android XML, iOS Swift"
      tested: true
      test_result: "Clean CSS variables output from JSON tokens"
      note: "No browser dependency. Supports multi-platform output."

  svg_optimization:
    description: "SVG 文件优化（去冗余、压缩、精简属性）"
    recommended:
      name: svgo
      type: cli
      install: "npx svgo (auto-downloads)"
      verify: "npx svgo --version"
      usage: "npx svgo input.svg -o output.min.svg"
      example: |
        npx svgo diagram.svg -o diagram.min.svg
        # 484 bytes -> 269 bytes (44% reduction, 17ms)
      output_format: "Optimized SVG file"
      tested: true
      test_result: "44% size reduction on test SVG"
      note: "No browser dependency. Fast. Good for D2 output post-processing."

  html_screenshot:
    description: "HTML → PNG 截图（用于 PDF 嵌入、视觉审查）"
    recommended:
      name: playwright-screenshot
      type: cli
      install: "npm install -g playwright && npx playwright install chromium"
      verify: "playwright --version"
      usage: |
        playwright screenshot "file:///path/to/file.html" output.png --full-page
        Options: --device "iPhone 11", --color-scheme dark, --viewport-size 1440,900
      example: |
        playwright screenshot "file:///tmp/wireframe.html" wireframe.png --full-page
        # Output: 1280x720 PNG, ~18KB
      output_format: "PNG screenshot"
      tested: true
      test_result: "18KB PNG from simple HTML page"
      note: "Requires one-time Chromium install (~210MB). Supports device emulation."

  # ═══════════════════════════════════════
  # Web Frontend Tools (added 2026-04-02)
  # ═══════════════════════════════════════

  project_scaffold:
    description: "Create new frontend project with framework, TypeScript, linting, styling pre-configured"
    recommended:
      name: create-next-app
      type: cli
      install: "npx create-next-app@latest (auto-downloads)"
      verify: "N/A (scaffolds a new project directory)"
      usage: |
        npx create-next-app@latest my-app --typescript --tailwind --eslint --app --src-dir --use-npm
        Options:
          --typescript   Enable TypeScript
          --tailwind     Enable Tailwind CSS
          --eslint       Enable ESLint
          --app          Use App Router (not Pages Router)
          --src-dir      Use src/ directory
          --use-npm      Use npm (default is ask)
          --no-git       Skip git init
      example: |
        npx create-next-app@latest todo-app --typescript --tailwind --eslint --app --src-dir --use-npm
        # Creates:
        # todo-app/
        # ├── src/app/          (App Router pages)
        # │   ├── layout.tsx
        # │   ├── page.tsx
        # │   └── globals.css
        # ├── public/
        # ├── tsconfig.json
        # ├── tailwind.config.ts
        # ├── next.config.ts
        # └── package.json
      output_format: "Complete project directory"
      tested: true
      test_result: "Full Next.js project scaffolded in ~20s with TS + Tailwind + ESLint + App Router"
    alternatives:
      - name: create-vite
        type: cli
        install: "npm create vite@latest (auto-downloads)"
        usage: "npm create vite@latest my-app -- --template react-ts"
        note: "Lighter weight, no SSR by default. Best for SPA/client-only apps."

  component_library:
    description: "Add pre-built, customizable UI components to a project (shadcn/ui)"
    recommended:
      name: shadcn
      type: cli
      install: "npx shadcn@latest (auto-downloads)"
      verify: "N/A (works via npx)"
      usage: |
        1. Initialize in project root: npx shadcn@latest init -d
           (-d flag auto-detects framework config)
        2. Add components: npx shadcn@latest add button card input form dialog
        3. Components are copied to src/components/ui/ (you own the code)
      example: |
        # Initialize shadcn in a Next.js project
        npx shadcn@latest init -d
        # Output: Created button.tsx + utils.ts

        # Add specific components
        npx shadcn@latest add card input dialog table
        # Output: Created card.tsx, input.tsx, dialog.tsx, table.tsx in src/components/ui/

        # Use in code:
        import { Button } from "@/components/ui/button"
        import { Card, CardHeader, CardTitle, CardContent } from "@/components/ui/card"
      output_format: "React component files in src/components/ui/"
      tested: true
      test_result: "Init created button.tsx + utils.ts; add created card.tsx + input.tsx"
      note: "Components are copied to your project (not a dependency). You can customize freely."

  api_type_generation:
    description: "Generate TypeScript types from OpenAPI/Swagger spec"
    recommended:
      name: openapi-typescript
      type: cli
      install: "npx openapi-typescript (auto-downloads)"
      verify: "npx openapi-typescript --version"
      usage: |
        npx openapi-typescript api-spec.yaml -o src/lib/api-types.ts
        Accepts: OpenAPI 3.0/3.1 YAML or JSON
        Output: TypeScript interfaces for all paths, components, operations
      example: |
        # From a local spec file:
        npx openapi-typescript api.yaml -o src/lib/api-types.ts

        # From a remote URL:
        npx openapi-typescript https://api.example.com/openapi.json -o src/lib/api-types.ts

        # Generated output includes:
        export interface paths {
          "/todos": {
            get: { responses: { 200: { content: { "application/json": components["schemas"]["Todo"][] } } } }
          }
        }
        export interface components {
          schemas: { Todo: { id: number; title: string; completed: boolean } }
        }
      output_format: "TypeScript definition file (.ts)"
      tested: true
      test_result: "Generated typed interfaces from OpenAPI YAML in 21ms"
      note: "Auto-downloads via npx, no global install. Supports OpenAPI 3.0 and 3.1."

  code_linting:
    description: "Static code analysis for JavaScript/TypeScript (ESLint)"
    recommended:
      name: eslint
      type: cli
      install: "Included with create-next-app. Or: npm install -D eslint @eslint/js"
      verify: "npx eslint --version"
      usage: |
        npx eslint .                        # Check all files
        npx eslint . --fix                  # Auto-fix fixable issues
        npx eslint . --max-warnings 0       # Fail on warnings too
        npx eslint src/app/page.tsx         # Check single file
      example: |
        # Check entire project
        npx eslint .
        # Output: (empty = no errors)

        # Check with strict mode
        npx eslint . --max-warnings 0
        # Output: ✖ 0 problems (0 errors, 0 warnings)
      output_format: "Terminal output with file:line:col error/warning messages"
      tested: true
      test_result: "Zero errors on fresh Next.js scaffold"
      note: "Comes pre-configured with create-next-app. ESLint v10+ uses flat config."

  type_checking:
    description: "TypeScript static type checking without emitting files"
    recommended:
      name: typescript
      type: cli
      install: "Included with create-next-app. Or: npm install -D typescript"
      verify: "npx tsc --version"
      usage: |
        npx tsc --noEmit                    # Type-check without output files
        npx tsc --noEmit --pretty           # Colored output
        npx tsc --noEmit -p tsconfig.json   # Explicit config
      example: |
        # Type-check entire project
        npx tsc --noEmit
        # Output: (empty = no errors)

        # With errors:
        # src/app/page.tsx(5,3): error TS2322: Type 'string' is not assignable to type 'number'.
      output_format: "Terminal output with file(line,col): error messages"
      tested: true
      test_result: "Zero errors on fresh Next.js + shadcn project"
      note: "tsconfig.json comes with create-next-app. Strict mode recommended."

  code_formatting:
    description: "Consistent code formatting for JS/TS/CSS/JSON (Prettier)"
    recommended:
      name: prettier
      type: cli
      install: "npm install -D prettier"
      verify: "npx prettier --version"
      usage: |
        npx prettier --check .              # Check formatting (exit 1 if issues)
        npx prettier --write .              # Auto-format all files
        npx prettier --check "src/**/*.tsx" # Check specific pattern
      example: |
        # Check formatting
        npx prettier --check "src/**/*.{ts,tsx}"
        # Output: Checking formatting...
        #   src/components/ui/button.tsx
        #   Code style issues found in 1 file. Run Prettier with --write to fix.

        # Fix formatting
        npx prettier --write "src/**/*.{ts,tsx}"
      output_format: "Terminal output listing files with issues"
      tested: true
      test_result: "Correctly detects formatting differences in shadcn-generated components"
      note: "v3.8.1 tested. Add .prettierrc for project-specific rules."

  bundle_analysis:
    description: "Visualize JavaScript bundle size and composition"
    status: experimental  # Not tested end-to-end (requires project with real bundle)
    recommended:
      name: vite-bundle-visualizer
      type: cli
      install: "npx vite-bundle-visualizer (for Vite projects)"
      verify: "N/A (runs via npx)"
      usage: |
        # For Next.js (which uses Turbopack/webpack):
        ANALYZE=true npm run build
        # (requires @next/bundle-analyzer plugin in next.config.ts)

        # For Vite projects:
        npx vite-bundle-visualizer
      example: |
        # Next.js bundle analysis setup:
        # 1. Install: npm install -D @next/bundle-analyzer
        # 2. In next.config.ts:
        import withBundleAnalyzer from '@next/bundle-analyzer';
        const config = withBundleAnalyzer({ enabled: process.env.ANALYZE === 'true' })({
          // ... next config
        });
        export default config;
        # 3. Run: ANALYZE=true npm run build
        # 4. Opens browser with interactive treemap
      output_format: "HTML treemap visualization in browser"
      tested: false
      test_result: "Not tested (requires project with actual bundle)"
      note: "For Next.js use @next/bundle-analyzer. For Vite use vite-bundle-visualizer. Note: Next.js config may use CJS (require) or ESM (import) syntax depending on project setup."

  build_verification:
    description: "Verify production build succeeds (Next.js)"
    recommended:
      name: next-build
      type: cli
      install: "Included with create-next-app"
      verify: "N/A (npm script)"
      usage: |
        npm run build                       # Full production build
        # Checks: TypeScript, ESLint, page rendering, static generation
      example: |
        npm run build
        # Output:
        # ✓ Linting and checking validity of types
        # ✓ Creating an optimized production build
        # ✓ Generating static pages (4/4)
        # Route (app)
        # ┌ ○ /
        # └ ○ /_not-found
        # ○ (Static) prerendered as static content
      output_format: "Terminal output with route summary"
      tested: true
      test_result: "Build succeeds, outputs static pages with route summary"
      note: "npm run build is the single most comprehensive check — includes tsc + eslint + render."

  # ═══════════════════════════════════════
  # Web Backend Tools (added 2026-04-02)
  # ═══════════════════════════════════════

  prisma_orm:
    description: "ORM + 数据库 Schema 管理（定义、验证、迁移、类型生成）"
    recommended:
      name: prisma
      type: cli
      install: "npm install -D prisma"
      verify: "npx prisma --version"
      usage: |
        1. npx prisma init --datasource-provider sqlite  # 初始化 schema
        2. 编辑 prisma/schema.prisma 定义 model
        3. npx prisma validate  # 验证语法和关系
        4. npx prisma format    # 自动格式化
        5. npx prisma generate  # 生成类型客户端（无需运行 DB）
        6. npx prisma db push   # 创建/同步 SQLite 数据库（零基础设施）
      example: |
        // prisma/schema.prisma
        datasource db {
          provider = "sqlite"
          url      = env("DATABASE_URL")
        }
        generator client {
          provider = "prisma-client-js"
        }
        model User {
          id    String @id @default(cuid())
          email String @unique
          name  String?
          todos Todo[]
          createdAt DateTime @default(now())
          updatedAt DateTime @updatedAt
        }
        model Todo {
          id        String  @id @default(cuid())
          title     String
          completed Boolean @default(false)
          userId    String
          user      User    @relation(fields: [userId], references: [id])
        }
        // 验证: npx prisma validate → "The schema is valid"
        // 推送: npx prisma db push → Creates dev.db SQLite file
      output_format: "Schema file + generated client + SQLite DB"
      tested: true
      test_result: "validate/format/generate/db push 全部离线成功，SQLite 无需 Docker"
      note: "SQLite 提供商零基础设施。Postgres/MySQL 需要运行 DB 才能 push/migrate。"

  openapi_linter:
    description: "OpenAPI/Swagger 规范验证 + API 文档预览"
    recommended:
      name: redocly-cli
      type: cli
      install: "npx @redocly/cli (auto-downloads)"
      verify: "npx @redocly/cli --version"
      usage: |
        npx @redocly/cli lint openapi.yaml          # 验证 + 详细诊断
        npx @redocly/cli bundle openapi.yaml -o out.yaml  # 合并多文件 spec
        npx @redocly/cli stats openapi.yaml          # 统计端点/schema 数
      example: |
        npx @redocly/cli lint openapi.yaml
        # Output:
        # [1] openapi.yaml:7:5 at #/paths/~1users/get
        #   Every operation should have security defined on it.
        #   Error was generated by the security-defined rule.
        # ❌ Validation failed with 4 errors and 6 warnings.
      output_format: "Terminal diagnostics with line numbers + rule names"
      tested: true
      test_result: "捕获 missing security、missing servers、缺少 operationId 等真实问题"
      note: "比废弃的 swagger-cli 更强。支持自定义规则配置。"

  seed_data:
    description: "生成逼真的测试/种子数据（姓名、邮箱、UUID、地址等）"
    recommended:
      name: faker-js
      type: cli
      install: "npm install -D @faker-js/faker"
      verify: "node -e \"const {faker}=require('@faker-js/faker');console.log(faker.person.fullName())\""
      usage: |
        在 Node.js 脚本中使用：
        const { faker } = require('@faker-js/faker');
        faker.seed(42);  // 确定性种子，可复现
        const users = Array.from({length:10}, () => ({
          id: faker.string.uuid(),
          name: faker.person.fullName(),
          email: faker.internet.email(),
          createdAt: faker.date.past().toISOString()
        }));
      example: |
        // seed.mjs
        import { faker } from '@faker-js/faker';
        faker.seed(42);
        for (let i = 0; i < 5; i++) {
          console.log(`INSERT INTO users (id, name, email) VALUES ('${faker.string.uuid()}', '${faker.person.fullName()}', '${faker.internet.email()}');`);
        }
        // 运行: node seed.mjs
      output_format: "SQL INSERT / JSON / CSV"
      tested: true
      test_result: "生成 5 用户 + 10 帖子的 SQL INSERT 语句"
      note: "零外部依赖。faker.seed(N) 保证可复现。"

  api_testing:
    description: "HTTP API 端点测试（curl 预装）"
    recommended:
      name: curl
      type: cli
      install: "macOS 预装，无需安装"
      verify: "curl --version"
      usage: |
        curl -s URL                                    # GET
        curl -s -X POST -H "Content-Type: application/json" -d '{"key":"val"}' URL  # POST JSON
        curl -s -w "\n%{http_code}" URL                # 显示状态码
        curl -s URL | python3 -m json.tool             # 格式化 JSON 输出
      example: |
        # GET 请求
        curl -s http://localhost:3000/api/todos | python3 -m json.tool
        # POST 创建
        curl -s -X POST -H "Content-Type: application/json" \
          -d '{"title":"Buy milk","completed":false}' \
          http://localhost:3000/api/todos
        # 带 Auth header
        curl -s -H "Authorization: Bearer TOKEN" http://localhost:3000/api/me
      output_format: "JSON response in terminal"
      tested: true
      test_result: "macOS 预装 curl 8.7.1，支持所有 HTTP 方法"

  # ═══════════════════════════════════════
  # Web Testing Tools (added 2026-04-02)
  # ═══════════════════════════════════════

  e2e_testing:
    description: "E2E browser automation testing (Playwright)"
    recommended:
      name: playwright
      type: cli
      install: "npm install -D @playwright/test && npx playwright install chromium"
      verify: "npx playwright --version"
      usage: |
        1. npx playwright test                     # Run all tests
        2. npx playwright test --ui                # Open UI mode
        3. npx playwright test --reporter=html     # HTML report
        4. npx playwright test tests/login.spec.ts # Single file
        5. npx playwright codegen url              # Generate test from browser
      example: |
        // tests/todo.spec.ts
        import { test, expect } from '@playwright/test';
        test('create todo', async ({ page }) => {
          await page.goto('http://localhost:3000');
          await page.getByPlaceholder('Add a todo').fill('Buy milk');
          await page.getByRole('button', { name: 'Add' }).click();
          await expect(page.getByText('Buy milk')).toBeVisible();
        });
        // Run: npx playwright test tests/todo.spec.ts
        // Report: npx playwright show-report
      output_format: "HTML report + trace files + screenshots"
      tested: true
      test_result: "Playwright 1.54.2, tests execute with HTML reporter"
      note: "Requires one-time browser install (~210MB for Chromium). Supports Chromium, Firefox, WebKit."
    alternatives:
      - name: cypress
        type: cli
        install: "npm install -D cypress"
        note: "Alternative E2E framework, slower but has built-in dashboard"

  unit_testing:
    description: "Unit and integration testing (Vitest)"
    recommended:
      name: vitest
      type: cli
      install: "npm install -D vitest"
      verify: "npx vitest --version"
      usage: |
        npx vitest run                    # Run all tests once
        npx vitest                        # Watch mode
        npx vitest run --reporter=verbose # Verbose output
        npx vitest run path/to/file       # Single file
      example: |
        // sum.test.ts
        import { describe, it, expect } from 'vitest';
        import { sum } from './sum';
        describe('sum', () => {
          it('adds two numbers', () => {
            expect(sum(1, 2)).toBe(3);
          });
          it('handles negatives', () => {
            expect(sum(-1, 1)).toBe(0);
          });
        });
        // Run: npx vitest run --reporter=verbose
        // Output: ✓ sum.test.ts > sum > adds two numbers (1ms)
      output_format: "Terminal output with pass/fail per test"
      tested: true
      test_result: "Vitest 4.1.2, 2 tests passed in 113ms"
      note: "Jest-compatible API. Faster than Jest. Native TypeScript support."

  test_coverage:
    description: "Code coverage reporting (V8 coverage for Vitest)"
    recommended:
      name: vitest-coverage-v8
      type: cli
      install: "npm install -D @vitest/coverage-v8"
      verify: "npx vitest run --coverage (auto-detects)"
      usage: |
        npx vitest run --coverage              # Generate coverage report
        # Add to vitest.config.ts for persistent config:
        # coverage: { provider: 'v8', reporter: ['text', 'html'], thresholds: { lines: 80 } }
      example: |
        npx vitest run --coverage
        # Output:
        # % Coverage report from v8
        # ----------|---------|----------|---------|---------|
        # File      | % Stmts | % Branch | % Funcs | % Lines |
        # ----------|---------|----------|---------|---------|
        # All files |     100 |      100 |     100 |     100 |
        #  sum.ts   |     100 |      100 |     100 |     100 |
        # ----------|---------|----------|---------|---------|
      output_format: "Terminal table + HTML coverage report"
      tested: true
      test_result: "Coverage report generated with V8 provider, 100% on test file"
      note: "V8 provider is faster than Istanbul. Configure thresholds in vitest.config.ts."

  performance_audit:
    description: "Page performance scoring (Lighthouse CLI)"
    recommended:
      name: lighthouse
      type: cli
      install: "npx lighthouse (auto-downloads)"
      verify: "npx lighthouse --version"
      usage: |
        npx lighthouse URL --output=json --output-path=report.json  # JSON report
        npx lighthouse URL --output=html --output-path=report.html  # HTML report
        npx lighthouse URL --only-categories=performance             # Performance only
        npx lighthouse URL --preset=desktop                          # Desktop preset
      example: |
        npx lighthouse http://localhost:3000 --output=json --output-path=lighthouse.json --chrome-flags="--headless"
        # Output: JSON with scores for Performance, Accessibility, Best Practices, SEO
        # Key metrics: LCP, FID, CLS, TTI, TBT
      output_format: "JSON or HTML report with scores 0-100"
      tested: true
      test_result: "Lighthouse 13.0.3 auto-downloads via npx"
      note: "Requires Chrome/Chromium. Use --chrome-flags='--headless' for CI."

  accessibility_audit:
    description: "Comprehensive WCAG accessibility checking (axe-core)"
    recommended:
      name: axe-core-cli
      type: cli
      install: "npx @axe-core/cli (auto-downloads)"
      verify: "npx @axe-core/cli --version"
      usage: |
        npx @axe-core/cli URL                          # Check URL
        npx @axe-core/cli URL --tags wcag2aa            # WCAG 2.1 AA only
        npx @axe-core/cli URL --reporter json            # JSON output
      example: |
        npx @axe-core/cli http://localhost:3000 --tags wcag2aa
        # Output:
        # Violation of "color-contrast" with 3 nodes
        # Violation of "label" with 1 node
        # 2 violations found
      output_format: "Terminal violations list or JSON"
      tested: true
      test_result: "axe-core 4.11.1, detects WCAG violations"
      note: "More comprehensive than pa11y. Supports custom rule configuration."
    alternatives:
      - name: pa11y
        type: cli
        note: "Already in registry. Lighter weight, bundles own Puppeteer."

  # ═══════════════════════════════════════
  # Web Deployment Tools (added 2026-04-02)
  # ═══════════════════════════════════════

  actions_linter:
    description: "GitHub Actions YAML 静态验证（语法、表达式、安全检查）"
    recommended:
      name: actionlint
      type: cli
      install: "brew install actionlint"
      verify: "actionlint --version"
      usage: |
        actionlint .github/workflows/ci.yml     # 验证单个文件
        actionlint                                # 验证所有 workflow 文件
        actionlint -format '{{json .}}'          # JSON 输出
      example: |
        actionlint .github/workflows/ci.yml
        # 捕获: actions/setup-node 缺少 @ref
        # 捕获: expression 语法错误 (= vs ==)
        # 退出码 1 = 有错误（CI 友好）
      output_format: "Terminal diagnostics with file:line"
      tested: true
      test_result: "捕获缺少 @ref、表达式语法、shell injection 风险"
      note: "零配置，离线工作，无需认证。6MB 二进制。"

  env_manager:
    description: "环境变量管理（加密/解密/验证）"
    recommended:
      name: dotenvx
      type: cli
      install: "npx @dotenvx/dotenvx (auto-downloads)"
      verify: "npx @dotenvx/dotenvx --version"
      usage: |
        npx @dotenvx/dotenvx encrypt           # 加密 .env → .env.vault
        npx @dotenvx/dotenvx decrypt           # 解密
        npx @dotenvx/dotenvx get KEY           # 获取单个变量
        npx @dotenvx/dotenvx set KEY=VALUE     # 设置变量
      example: |
        echo "DATABASE_URL=sqlite://dev.db" > .env
        npx @dotenvx/dotenvx encrypt
        # Output: .env.vault created (encrypted)
        npx @dotenvx/dotenvx get DATABASE_URL
        # Output: sqlite://dev.db
      output_format: "Terminal output + encrypted .env.vault file"
      tested: true
      test_result: "encrypt/decrypt/get 全部正常，无需认证"
      note: "无需外部服务。支持多环境（.env.production, .env.staging）。"

  performance_audit_ci:
    description: "Web 性能审计 CI 集成（Lighthouse CI — CI 断言模式）"
    recommended:
      name: lighthouse-ci
      type: cli
      install: "npx @lhci/cli (auto-downloads, 需要 Chrome)"
      verify: "npx @lhci/cli --version"
      usage: |
        npx @lhci/cli autorun --collect.url=URL  # 运行审计
        npx @lhci/cli assert --preset lighthouse:recommended  # 断言阈值
      example: |
        npx @lhci/cli autorun --collect.url=http://localhost:3000
        # Output: JSON scores
        # performance: 0.84, accessibility: 0.92, best-practices: 1.0, seo: 0.91
      output_format: "JSON scores + HTML report"
      tested: true
      test_result: "成功运行，输出结构化评分"
      note: "需要 Chrome/Chromium。可配置断言阈值（性能 ≥0.9 等）。"

  deployment_platform:
    description: "Vercel 部署平台 CLI（部署、环境变量、预览）"
    recommended:
      name: vercel-cli
      type: cli
      install: "npm install -g vercel"
      verify: "vercel --version"
      usage: |
        vercel deploy              # 部署到预览环境
        vercel deploy --prod       # 部署到生产
        vercel env pull            # 拉取环境变量到本地 .env
        vercel build               # 本地构建测试
        vercel inspect URL         # 查看部署信息
      example: |
        # 部署到预览
        vercel deploy
        # Output: https://my-app-abc123.vercel.app

        # 部署到生产
        vercel deploy --prod
        # Output: https://my-app.vercel.app
      output_format: "Terminal output with deployment URL"
      tested: true
      test_result: "CLI 正常，但几乎所有操作需要 auth token"
      note: "需要 vercel login 或 VERCEL_TOKEN。核心部署工具。"

  # ═══════════════════════════════════════
  # Mobile Development Tools (added 2026-04-02)
  # ═══════════════════════════════════════

  expo_scaffold:
    description: "Create Expo/React Native project with TypeScript"
    recommended:
      name: create-expo-app
      type: cli
      install: "npx create-expo-app@latest (auto-downloads)"
      verify: "N/A (scaffolds project)"
      usage: |
        npx create-expo-app@latest my-app --template blank-typescript
        cd my-app && npx expo start  # Start dev server
      example: |
        npx create-expo-app@latest menu-snap --template blank-typescript
        # Creates:
        # menu-snap/
        # ├── App.tsx
        # ├── app.json         (Expo config)
        # ├── tsconfig.json
        # ├── assets/
        # └── package.json
        cd menu-snap && npx expo start
        # Output: Metro bundler running, QR code for Expo Go
      output_format: "Complete project directory"
      tested: true
      test_result: "Full Expo project scaffolded with TypeScript template"
      note: "Use blank-typescript template for new projects. Expo SDK auto-included."

  ios_build:
    description: "Build iOS app from Xcode project/workspace"
    recommended:
      name: xcodebuild
      type: cli
      install: "macOS built-in (requires Xcode)"
      verify: "xcodebuild -version"
      usage: |
        xcodebuild -workspace App.xcworkspace -scheme App -sdk iphonesimulator build
        xcodebuild -workspace App.xcworkspace -scheme App -destination 'platform=iOS Simulator,name=iPhone 16' test
      example: |
        # Build for simulator
        xcodebuild -workspace ios/MenuSnap.xcworkspace \
          -scheme MenuSnap \
          -sdk iphonesimulator \
          -configuration Debug \
          build
        # Output: BUILD SUCCEEDED
      output_format: "Terminal build log + .app bundle"
      tested: true
      test_result: "xcodebuild available on macOS"
      note: "Requires Xcode installed. For Expo projects, use 'npx expo run:ios' instead."

  mobile_simulator:
    description: "Control iOS Simulator from command line"
    recommended:
      name: xcrun-simctl
      type: cli
      install: "macOS built-in (requires Xcode)"
      verify: "xcrun simctl list devices"
      usage: |
        xcrun simctl list devices                    # List available simulators
        xcrun simctl boot "iPhone 16"                # Boot simulator
        xcrun simctl install booted app.app          # Install app
        xcrun simctl openurl booted "myapp://path"   # Open deep link
        xcrun simctl screenshot booted screenshot.png # Take screenshot
      example: |
        xcrun simctl list devices | grep "iPhone 16"
        # iPhone 16 (XXXXXXXX-XXXX) (Booted)
        xcrun simctl screenshot booted /tmp/screen.png
        # Output: /tmp/screen.png (simulator screenshot)
      output_format: "Terminal output + screenshot PNG"
      tested: true
      test_result: "simctl available, lists devices"
      note: "Requires Xcode + iOS Simulator runtime. Use for screenshot-based testing."

  android_build:
    description: "Build Android app with Gradle"
    recommended:
      name: gradle
      type: cli
      install: "Included with React Native projects (./gradlew)"
      verify: "./gradlew --version (from android/ directory)"
      usage: |
        cd android && ./gradlew assembleDebug      # Debug APK
        cd android && ./gradlew assembleRelease    # Release APK
        cd android && ./gradlew bundleRelease      # AAB for Play Store
      example: |
        cd android && ./gradlew assembleDebug
        # Output: BUILD SUCCESSFUL
        # APK at: android/app/build/outputs/apk/debug/app-debug.apk
      output_format: "APK or AAB file"
      tested: false
      test_result: "Not tested (requires Android SDK)"
      note: "Requires Android SDK. For Expo, use 'npx expo run:android' or 'eas build'."
