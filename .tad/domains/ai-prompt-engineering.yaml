# Domain-specific Gates
# ═══════════════════════════════════════

gates:
  gate2_design:
    checklist:
      - "System prompt 有 ≥3 个参考分析"
      - "Few-shot 示例覆盖 happy path + edge case + anti-example"
      - "测试策略有 golden dataset (≥15 cases)"
      - "输出格式有完整 schema 定义"
      - "Context 有 token 审计"
      - "版本管理方案已定义"

  gate4_acceptance:
    checklist:
      - "promptfoo 测试 PASS rate ≥80%"
      - "输出格式 compliance ≥95%"
      - "Context 压缩率 ≥30%（或说明已精简）"
      - "版本管理有回归测试"
      - "所有文档可在 15 分钟内读完"
