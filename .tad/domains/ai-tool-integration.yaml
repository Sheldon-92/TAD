# Domain-specific Gate Standards
# ═══════════════════════════════════════

gates:
  gate2_design:
    checklist:
      - "7 capabilities: 4 Code B + 3 Doc A 各有正确的 step 模型"
      - "Code B: 选型→执行→验证→优化"
      - "Doc A: 搜索→分析→推导→生成"
      - "quality_criteria 全部可量化"
      - "anti_patterns 有具体案例"
      - "工具引用在 tools-registry 有对应条目"

  gate4_acceptance:
    checklist:
      - "E2E 测试 ≥5/7 维度 PASS"
      - "Code B 产出物可构建可运行（npx tsc 零错误）"
      - "Doc A 产出物有分析深度（不是数据罗列）"
      - "零编造: 所有 API 端点/工具功能有来源"
      - "文件可用: 代码可构建 + PDF/SVG >0 bytes"
