# ═══════════════════════════════════════
# Domain-specific Gate Standards
# ═══════════════════════════════════════

gates:
  gate2_design:
    checklist:
      - "9 capabilities 每个有 4+ steps (search → analyze → derive → generate)"
      - "分析步骤基于 Phase 1 研究（有来源标注）"
      - "quality_criteria 全部可量化（有数字或具体要求）"
      - "anti_patterns 有具体案例（不是'不要犯错'）"
      - "reviewers 有领域专家 persona + checklist"
      - "工具引用在 tools-registry 有对应条目"

  gate4_acceptance:
    checklist:
      - "E2E 测试 ≥5/7 维度 PASS"
      - "分析深度: 有 'So What' 层（不是数据罗列）"
      - "推导链: 结论←分析←数据 可追溯"
      - "零编造: 所有数据有来源 URL"
      - "文件可用: PDF/SVG 生成且 >0 bytes"
      - "框架无关: 不绑定特定环境"
