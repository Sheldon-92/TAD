# ═══════════════════════════════════════
# Domain-specific Gate 标准
# ═══════════════════════════════════════

gates:
  gate2_design:
    checklist:
      - "OpenAPI spec 通过 Redocly lint 零 error"
      - "Prisma schema 通过 npx prisma validate"
      - "RBAC 矩阵覆盖所有资源×角色"
      - "错误目录覆盖所有 HTTP 状态码"
      - "ER 图反映所有实体和关系"

  gate4_acceptance:
    checklist:
      - "API 端点可通过 curl 测试"
      - "种子数据脚本可运行"
      - "认证流程有完整的 token 生命周期"
      - "所有 5xx 响应不泄漏实现细节"
      - "结构化日志有 requestId"
