# ═══════════════════════════════════════
# Domain-specific Gate Standards
# ═══════════════════════════════════════

gates:
  gate2_design:
    checklist:
      - "评估框架覆盖 ≥3 个维度（capability + reliability + safety）"
      - "评分标准有锚定描述（不是模糊的 1-5 分）"
      - "测试场景 ≥5 个（覆盖核心/边界/错误/性能）"
      - "工具选型有理由（不是随机选）"
      - "安全边界有明确定义（forbidden actions + priorities）"

  gate4_acceptance:
    checklist:
      - "基准测试已执行，Pass@k 和 Pass^k 有报告"
      - "回归测试 golden suite 已建立且通过"
      - "对抗性测试 P0 vulnerabilities 通过"
      - "人工评估 inter-rater agreement ≥70%"
      - "CI 管线配置可直接使用"
