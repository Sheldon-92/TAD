change:
  type: "add_knowledge"
  current: "Gate 3 criteria assumes code-type tasks (build/test/lint/tsc). Non-dev tasks (voice production, trading) fail at 50% rate."
  proposed: |
    Gate 3 criteria should branch on task_type:
    - task_type=code/mixed: existing Layer 1 (build/test/lint/tsc) + Layer 2 expert review
    - task_type=deliverable: skip build/test/lint, run pack-specific rubric (deliverable-rubrics.yaml) + expert review
    - task_type=research: skip build/test/lint, verify research artifacts exist + expert review
    Gate 3 50% failure rate on 买卖+Colin声音项目 is caused by applying code-oriented Layer 1 checks to non-code deliverables.
  diff: |
    - Gate 3 Layer 1 always runs build/test/lint/tsc
    + Gate 3 Layer 1 branches on task_type: code→build/test/lint; deliverable→rubric; research→artifact check

